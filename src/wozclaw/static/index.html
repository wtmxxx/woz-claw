        function addAssistantMsg(text, toolCalls = [], loadedSkills = [], activityTraces = [], thinkingTexts = [], assistantTexts = [], timelineEvents = [], fromHistory = false) {
            clearTransientStatusMessages();
            const normalizedText = String(text || '').trim();
            const hiddenAssistantMessagePrefixes = [
                '检测到需要人工审批，已暂停执行并等待审批结果',
                '检测到需要做出选择，已暂停执行并等待用户选择',
            ];
            const shouldHideText = hiddenAssistantMessagePrefixes.some((prefix) => normalizedText.startsWith(prefix));

            let block = getLatestAssistantBlock();
            if (!block) {
                block = document.createElement('div');
                block.className = 'assistant-block space-y-2';
                messagesEl.appendChild(block);
            }

            const normalizedTimelineEvents = normalizeTimelineEvents(timelineEvents);

            if (fromHistory && normalizedTimelineEvents.length > 0) {
                normalizedTimelineEvents.forEach((event) => {
                    if (event.type === 'assistant_thinking') {
                        appendThinkingBlock(block, event.text);
                        return;
                    }
                    if (event.type === 'assistant_text') {
                        appendAssistantTextBlock(block, event.text);
                        return;
                    }
                    if (event.type === 'tool' || event.type === 'tool_called') {
                        appendHistoryToolTraceCard(block, {
                            name: event.name,
                            input: event.input,
                            output: event.output,
                            trace_id: event.trace_id,
                        });
                    }
                });
            } else {
                normalizeTextList(thinkingTexts).forEach((thinkingText) => {
                    appendThinkingBlock(block, thinkingText);
                });

                normalizeTextList(assistantTexts).forEach((assistantText) => {
                    appendAssistantTextBlock(block, assistantText);
                });

                // Create tool cards from tool_calls ONLY when loading history
                // During real-time execution, SSE events create the cards
                if (fromHistory && toolCalls && toolCalls.length > 0) {
                    toolCalls.forEach((toolCall) => {
                        appendHistoryToolTraceCard(block, toolCall);
                    });
                }
            }

            if (!shouldHideText && normalizedText) {
                appendAssistantTextBlock(block, normalizedText);
            }

            if (block.children.length === 0) {
                block.remove();
                return;
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addApprovalRequestCard(request) {
            const item = request || {};
            const requestId = String(item.request_id || '');
            const command = String(item.command || '');
            const operation = String(item.operation || 'unknown');
            const reason = String(item.reason || 'requires human approval');
            if (!requestId || !command) return;
            if (completedRequestIds.has(requestId)) return;
            if (messagesEl.querySelector(`[data-request-card="approval:${requestId}"]`)) return;

            const wrap = document.createElement('div');
            wrap.className = 'msg a rounded-chat';
            wrap.dataset.requestCard = `approval:${requestId}`;

            const title = document.createElement('div');
            title.className = 'font-semibold';
            title.textContent = '需要人工审批';

            const desc = document.createElement('pre');
            desc.className = 'mt-2 whitespace-pre-wrap text-sm';
            desc.textContent = `操作类型: ${operation}\n原因: ${reason}\n命令: ${command}`;

            const actions = document.createElement('div');
            actions.className = 'mt-2 flex gap-2';

            const approveBtn = document.createElement('button');
            approveBtn.type = 'button';
            approveBtn.className = 'primary-btn';
            approveBtn.textContent = '批准执行';

            const rejectBtn = document.createElement('button');
            rejectBtn.type = 'button';
            rejectBtn.className = 'secondary-btn';
            rejectBtn.textContent = '拒绝执行';

            const setBusy = (busy) => {
                approveBtn.disabled = busy;
                rejectBtn.disabled = busy;
            };

            async function submitApproval(approved) {
                setBusy(true);
                const approvedLabel = approved ? '已批准' : '已拒绝';

                if (approved) {
                    const approvalTraceEl = messagesEl.querySelector(`[data-approval-request-id="${requestId}"]`);
                    if (approvalTraceEl) {
                        const icon = approvalTraceEl.querySelector('.trace-icon');
                        const status = approvalTraceEl.querySelector('.trace-status');
                        if (icon) {
                            icon.className = 'trace-icon running';
                            icon.textContent = '⏳';
                        }
                        if (status) {
                            status.textContent = '已批准（执行中）';
                        }
                        approvalTraceEl.dataset.traceStatus = 'approval-approved';
                        approvalTraceEl.classList.remove('pending', 'completed');

                        const traceId = String(approvalTraceEl.dataset.traceId || '').trim();
                        if (traceId && pendingTraces[traceId]) {
                            pendingTraces[traceId].status = 'approval-approved';
                            pendingTraces[traceId].completed = false;
                        }
                    }
                }

                markRequestCompleted(requestId);
                wrap.remove();
                removeRequestCardsById('approval', requestId);
                addTransientStatusMsg(approvedLabel);
                try {
                    const user_id = userIdEl.value.trim();
                    const session_id = currentSessionId;

                    // Reconnect SSE before submitting approval to catch subsequent events
                    connectEventSource(session_id);

                    const res = await fetch('/api/approvals/decide', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id, session_id, request_id: requestId, approved }),
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        unmarkRequestCompleted(requestId);
                        addApprovalRequestCard(item);
                        addMsg('a', `审批处理失败: ${data.detail || 'unknown error'}`);
                        disconnectEventSource();
                        setBusy(false);
                        return;
                    }

                    // Add new assistant message with real tool calls (real outputs replace placeholders)
                    addAssistantMsg(data.reply || '', data.tool_calls || [], data.loaded_skills || [], data.activity_traces || []);

                    // Show next approval if present
                    if (data.approval_request) {
                        addApprovalRequestCard(data.approval_request);
                    }

                    // Show next choice if present
                    if (data.choice_request) {
                        addChoiceRequestCard(data.choice_request);
                    }

                    await loadConversations();
                    renderConversationList();
                } catch (err) {
                    unmarkRequestCompleted(requestId);
                    addApprovalRequestCard(item);
                    addMsg('a', `审批请求失败: ${err}`);
                    disconnectEventSource();
                    setBusy(false);
                }
            }

            approveBtn.addEventListener('click', async () => {
                await submitApproval(true);
            });
            rejectBtn.addEventListener('click', async () => {
                await submitApproval(false);
            });

            actions.appendChild(approveBtn);
            actions.appendChild(rejectBtn);
            wrap.appendChild(title);
            wrap.appendChild(desc);
            wrap.appendChild(actions);

            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addChoiceRequestCard(request) {
            const item = request || {};
            const requestId = String(item.request_id || '');
            const question = String(item.question || '请在以下选项中选择');
            const options = Array.isArray(item.options) ? item.options.map((v) => String(v || '').trim()).filter(Boolean) : [];
            const allowCustom = item.allow_custom !== false;
            if (!requestId) return;
            if (completedRequestIds.has(requestId)) return;
            if (messagesEl.querySelector(`[data-request-card="choice:${requestId}"]`)) return;

            const wrap = document.createElement('div');
            wrap.className = 'msg a rounded-chat';
            wrap.dataset.requestCard = `choice:${requestId}`;

            const title = document.createElement('div');
            title.className = 'font-semibold';
            title.textContent = '需要你做个选择';

            const desc = document.createElement('div');
            desc.className = 'mt-2 text-sm';
            desc.textContent = question;

            const optionsWrap = document.createElement('div');
            optionsWrap.className = 'mt-2 flex flex-wrap gap-2';

            const customWrap = document.createElement('div');
            customWrap.className = 'mt-2 flex gap-2';
            const customInput = document.createElement('input');
            customInput.type = 'text';
            customInput.placeholder = '或输入你的自定义选项';
            customInput.className = 'flex-1 min-w-0 border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm';
            const customSubmit = document.createElement('button');
            customSubmit.type = 'button';
            customSubmit.className = 'secondary-btn shrink-0 whitespace-nowrap min-w-24';
            customSubmit.textContent = '提交自定义';

            let activeButtons = [];
            const setBusy = (busy) => {
                activeButtons.forEach((btn) => {
                    btn.disabled = busy;
                });
                customInput.disabled = busy;
                customSubmit.disabled = busy;
            };

            async function submitChoice(selectedOption = '', customInputText = '') {
                setBusy(true);
                const finalChoice = customInputText || selectedOption;
                const choiceMessage = question
                    ? `针对问题【${question}】我的选择是：${finalChoice}`
                    : `我的选择是：${finalChoice}`;

                const choiceTraceEl = messagesEl.querySelector(`[data-choice-request-id="${requestId}"]`);
                if (choiceTraceEl) {
                    const icon = choiceTraceEl.querySelector('.trace-icon');
                    const status = choiceTraceEl.querySelector('.trace-status');
                    const outputContent = choiceTraceEl.querySelector('.trace-output pre');
                    if (icon) {
                        icon.className = 'trace-icon completed';
                        icon.textContent = '✓';
                    }
                    if (status) {
                        status.textContent = '已选择';
                    }
                    if (outputContent) {
                        outputContent.textContent = finalChoice ? `用户选择: ${finalChoice}` : '(无选择内容)';
                    }
                    choiceTraceEl.dataset.traceStatus = 'choice-selected';
                    choiceTraceEl.classList.remove('pending');
                    choiceTraceEl.classList.add('completed');
                    const traceId = String(choiceTraceEl.dataset.traceId || '').trim();
                    if (traceId && pendingTraces[traceId]) {
                        pendingTraces[traceId].output = finalChoice ? `用户选择: ${finalChoice}` : '';
                        pendingTraces[traceId].completed = true;
                        pendingTraces[traceId].status = 'choice-selected';
                    }
                }

                markRequestCompleted(requestId);
                wrap.remove();
                removeRequestCardsById('choice', requestId);
                const pendingChoiceMsgEl = addMsg('u', choiceMessage, false);
                pendingChoiceMsgEl.dataset.pendingChoice = '1';
                try {
                    const user_id = userIdEl.value.trim();
                    const session_id = currentSessionId;
                    connectEventSource(session_id);
                    const res = await fetch('/api/choices/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id,
                            session_id,
                            request_id: requestId,
                            selected_option: selectedOption,
                            custom_input: customInputText,
                        }),
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        unmarkRequestCompleted(requestId);
                        pendingChoiceMsgEl.remove();
                        addChoiceRequestCard(item);
                        addMsg('a', `提交选择失败: ${data.detail || 'unknown error'}`);
                        setBusy(false);
                        return;
                    }

                    addAssistantMsg(
                        `${data.reply}`,
                        data.tool_calls || [],
                        data.loaded_skills || [],
                        data.activity_traces || [],
                    );
                    if (data.approval_request) {
                        addApprovalRequestCard(data.approval_request);
                    }
                    if (data.choice_request) {
                        addChoiceRequestCard(data.choice_request);
                    }
                    if (data.title) {
                        currentTitleEl.textContent = data.title;
                    }
                    await loadConversations();
                    renderConversationList();
                } catch (err) {
                    unmarkRequestCompleted(requestId);
                    pendingChoiceMsgEl.remove();
                    addChoiceRequestCard(item);
                    addMsg('a', `提交选择失败: ${err}`);
                    disconnectEventSource();
                    setBusy(false);
                }
            }

            options.forEach((optionText) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'secondary-btn';
                btn.textContent = optionText;
                btn.addEventListener('click', async () => {
                    await submitChoice(optionText, '');
                });
                activeButtons.push(btn);
                optionsWrap.appendChild(btn);
            });

            customSubmit.addEventListener('click', async () => {
                const customText = String(customInput.value || '').trim();
                if (!customText) {
                    addMsg('a', '请输入自定义选项内容');
                    return;
                }
                await submitChoice('', customText);
            });

            wrap.appendChild(title);
            wrap.appendChild(desc);
            if (options.length > 0) {
                wrap.appendChild(optionsWrap);
            }
            if (allowCustom) {
                customWrap.appendChild(customInput);
                customWrap.appendChild(customSubmit);
                wrap.appendChild(customWrap);
            }

            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addMsg(cls, text, renderMarkdown = false) {
            if (cls === 'u') {
                clearTransientStatusMessages();
            }
            const div = document.createElement('div');
            div.className = `msg ${cls} rounded-chat`;
            if (renderMarkdown) {
                div.classList.add('md');
                const markdownHtml = marked.parse(text, {
                    breaks: true,
                    gfm: true,
                });
                div.innerHTML = DOMPurify.sanitize(markdownHtml);
            } else {
                div.textContent = text;
            }
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function clearMessages() {
            messagesEl.innerHTML = '';
            pendingTraces = {};
        }

        function closeConversationMenus() {
            conversationListEl.querySelectorAll('.conv-menu-list').forEach((node) => {
                node.classList.add('hidden');
            });
        }

        async function createConversation() {
            const user_id = userIdEl.value.trim();
            const res = await fetch('/api/conversations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '创建会话失败');
            return data.session_id;
        }

        async function deleteConversation(sessionId) {
            const user_id = userIdEl.value.trim();
            const res = await fetch(`/api/conversations/${encodeURIComponent(sessionId)}?user_id=${encodeURIComponent(user_id)}`,
                {
                    method: 'DELETE',
                },
            );
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '删除会话失败');

            const deletedCurrent = currentSessionId === sessionId;
            await loadConversations();

            if (conversations.length === 0) {
                const newSessionId = await createConversation();
                conversations = [{ session_id: newSessionId, title: '新对话' }];
                await switchConversation(newSessionId, '新对话');
                return;
            }

            if (deletedCurrent) {
                await switchConversation(conversations[0].session_id, conversations[0].title);
                return;
            }

            renderConversationList();
        }

        async function renameConversation(sessionId, currentTitle) {
            const user_id = userIdEl.value.trim();
            const nextTitleRaw = window.prompt('请输入新对话名称', String(currentTitle || '新对话'));
            if (nextTitleRaw === null) return;

            const nextTitle = String(nextTitleRaw || '').trim();
            if (!nextTitle) {
                addMsg('a', '重命名失败: 标题不能为空');
                return;
            }

            const res = await fetch(`/api/conversations/${encodeURIComponent(sessionId)}/title`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id, title: nextTitle }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '重命名失败');

            if (currentSessionId === sessionId) {
                currentTitleEl.textContent = data.title || nextTitle;
            }
            await loadConversations();
            renderConversationList();
        }

        function renderConversationList() {
            conversationListEl.innerHTML = '';
            conversations.forEach((item) => {
                const row = document.createElement('div');
                row.className = 'conv-row';

                const card = document.createElement('div');
                card.className = 'conv-card' + (item.session_id === currentSessionId ? ' active' : '');

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'conv-item conv-main transition duration-150 ease-out' + (item.session_id === currentSessionId ? ' active' : '');
                btn.textContent = item.title || '新对话';
                btn.addEventListener('click', () => switchConversation(item.session_id, item.title));

                const menuWrap = document.createElement('div');
                menuWrap.className = 'conv-menu-wrap';

                const menuTrigger = document.createElement('button');
                menuTrigger.type = 'button';
                menuTrigger.className = 'conv-menu-trigger';
                menuTrigger.textContent = '⋯';

                const menuList = document.createElement('div');
                menuList.className = 'conv-menu-list hidden';

                const renameItem = document.createElement('button');
                renameItem.type = 'button';
                renameItem.className = 'conv-menu-item rename';
                renameItem.textContent = '重命名';

                const deleteItem = document.createElement('button');
                deleteItem.type = 'button';
                deleteItem.className = 'conv-menu-item';
                deleteItem.textContent = '删除对话';

                menuTrigger.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const shouldShow = menuList.classList.contains('hidden');
                    closeConversationMenus();
                    if (shouldShow) {
                        menuList.classList.remove('hidden');
                    }
                });

                renameItem.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    closeConversationMenus();
                    try {
                        await renameConversation(item.session_id, item.title || '新对话');
                    } catch (err) {
                        addMsg('a', `重命名失败: ${err}`);
                    }
                });

                deleteItem.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    closeConversationMenus();
                    const ok = window.confirm('确认删除该对话吗？此操作不可恢复。');
                    if (!ok) return;
                    try {
                        await deleteConversation(item.session_id);
                    } catch (err) {
                        addMsg('a', `删除会话失败: ${err}`);
                    }
                });

                card.appendChild(btn);
                menuList.appendChild(renameItem);
                menuList.appendChild(deleteItem);
                menuWrap.appendChild(menuTrigger);
                menuWrap.appendChild(menuList);
                card.appendChild(menuWrap);
                row.appendChild(card);
                conversationListEl.appendChild(row);
            });
        }

        async function loadConversations() {
            const user_id = userIdEl.value.trim();
            const res = await fetch(`/api/conversations?user_id=${encodeURIComponent(user_id)}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '加载会话失败');
            conversations = data.items || [];
            renderConversationList();
        }

        async function loadMessages(sessionId) {
            const user_id = userIdEl.value.trim();
            const res = await fetch(`/api/conversations/${encodeURIComponent(sessionId)}/messages?user_id=${encodeURIComponent(user_id)}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '加载历史失败');
            clearMessages();
            (data.items || []).forEach((item) => {
                if (item.role === 'assistant') {
                    const meta = item.meta || {};
                    addAssistantMsg(
                        item.content,
                        item.tool_calls || [],
                        item.loaded_skills || [],
                        item.activity_traces || [],
                        normalizeTextList(meta.ui_thinking_texts || meta.thinking_texts || []),
                        normalizeTextList(meta.ui_assistant_texts || meta.assistant_texts || []),
                        normalizeTimelineEvents(meta.ui_timeline_events || []),
                        true  // fromHistory = true, so it creates tool cards
                    );
                } else {
                    addMsg('u', item.content, false);
                }
            });
        }

        async function switchConversation(sessionId, title = '新对话') {
            disconnectEventSource();
            currentSessionId = sessionId;
            loadCompletedRequestIds();
            currentTitleEl.textContent = title || '新对话';
            renderConversationList();
            await loadMessages(sessionId);
            await loadPendingState(sessionId);
        }

        async function loadPendingState(sessionId) {
            try {
                const user_id = userIdEl.value.trim();
                const res = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}/pending-state?user_id=${encodeURIComponent(user_id)}`);
                const data = await res.json();
                if (!res.ok) return;

                // Restore pending approvals
                const pending_approvals = Array.isArray(data.pending_approvals) ? data.pending_approvals : [];
                pending_approvals.forEach(approval => {
                    addApprovalRequestCard(approval);
                });

                // Restore pending choices
                const pending_choices = Array.isArray(data.pending_choices) ? data.pending_choices : [];
                pending_choices.forEach(choice => {
                    addChoiceRequestCard(choice);
                });
            } catch (err) {
                console.error('Failed to load pending state:', err);
            }
        }

        async function bootstrap() {
            await loadConversations();
            if (conversations.length === 0) {
                currentSessionId = await createConversation();
                conversations = [{ session_id: currentSessionId, title: '新对话' }];
                renderConversationList();
                clearMessages();
                currentTitleEl.textContent = '新对话';
                return;
            }
            await switchConversation(conversations[0].session_id, conversations[0].title);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = textEl.value.trim();
            if (!message) return;

            const user_id = userIdEl.value.trim();
            if (!currentSessionId) {
                currentSessionId = await createConversation();
            }
            const session_id = currentSessionId;

            addMsg('u', message);
            textEl.value = '';

            connectEventSource(session_id);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id, session_id, message }),
                });

                const data = await res.json();
                if (!res.ok) {
                    addMsg('a', `错误: ${data.detail || '请求失败'}`);
                    disconnectEventSource();
                    return;
                }

                addAssistantMsg(
                    `${data.reply}`,
                    data.tool_calls || [],
                    data.loaded_skills || [],
                    data.activity_traces || [],
                );

                if (data.approval_request) {
                    addApprovalRequestCard(data.approval_request);
                }
                if (data.choice_request) {
                    addChoiceRequestCard(data.choice_request);
                }
                if (data.title) {
                    currentTitleEl.textContent = data.title;
                }
                await loadConversations();
                renderConversationList();

            } catch (err) {
                addMsg('a', `网络错误: ${err}`);
                disconnectEventSource();
            }
        });

        newConversationBtn.addEventListener('click', async () => {
            try {
                const sessionId = await createConversation();
                currentSessionId = sessionId;
                currentTitleEl.textContent = '新对话';
                clearMessages();
                await loadConversations();
                conversations.unshift({ session_id: sessionId, title: '新对话' });
                renderConversationList();
            } catch (err) {
                addMsg('a', `创建会话失败: ${err}`);
            }
        });

        userIdEl.addEventListener('change', async () => {
            currentSessionId = null;
            syncUserProfile();
            await bootstrap();
        });

        document.addEventListener('click', () => {
            closeConversationMenus();
        });

        openSettingsBtn.addEventListener('click', async () => {
            try {
                await openSettingsView();
            } catch (err) {
                addMsg('a', `加载配置失败: ${err}`);
            }
        });

        backToChatBtn.addEventListener('click', () => {
            openChatView();
        });

        settingsTabMemoryEl.addEventListener('click', () => {
            switchSettingsPanel('memory');
        });

        settingsTabPolicyEl.addEventListener('click', () => {
            switchSettingsPanel('policy');
        });

        settingsTabSkillsEl.addEventListener('click', () => {
            switchSettingsPanel('skills');
        });

        skillUploadFileEl.addEventListener('change', () => {
            const file = skillUploadFileEl.files && skillUploadFileEl.files[0];
            skillUploadFileNameEl.textContent = file ? file.name : '未选择文件';
        });

        skillUploadBtnEl.addEventListener('click', async () => {
            try {
                settingsStatusEl.textContent = '';
                await uploadSkillZip();
            } catch (err) {
                settingsStatusEl.textContent = `上传失败: ${err}`;
            }
        });

        saveSettingsBtn.addEventListener('click', async () => {
            try {
                await saveSettings();
                settingsStatusEl.textContent = '保存成功';
            } catch (err) {
                settingsStatusEl.textContent = `保存失败: ${err}`;
            }
        });

        window.addEventListener('pageshow', scheduleScrollReset);
        window.addEventListener('load', scheduleScrollReset);
        window.addEventListener('beforeunload', resetPageScroll);
        scheduleScrollReset();
        syncUserProfile();

        bootstrap().catch((err) => {
            addMsg('a', `初始化失败: ${err}`);
        });
    </script>
</body>

</html>
