<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://www.wotemo.com/img/WotemoRoundCorner.png" />
    <title>WozClaw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef4ff',
                            100: '#dbe8ff',
                            500: '#2563eb',
                            600: '#1d4ed8',
                            700: '#1e40af',
                        },
                    },
                    boxShadow: {
                        card: '0 8px 24px rgba(37, 99, 235, 0.08)',
                        pop: '0 14px 36px rgba(15, 23, 42, 0.12)',
                    },
                    borderRadius: {
                        'chat': '18px',
                    },
                },
            },
        };
    </script>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-soft: #f5f7fb;
            --sidebar-bg: #f3f6fb;
            --chat-bg: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff4ff;
            --line: #dbe3ef;
            --line-strong: #c8d5e8;
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 22px;
            --shadow-card: none;
            --shadow-pop: none;
            --ui-scale: 1.15;
            --composer-bar-height: 64px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            font-family: "Manrope", "Noto Sans SC", "Source Han Sans SC", sans-serif;
            color: var(--text);
            background: var(--bg);
            display: block;
            padding: 0;
            overflow: hidden;
        }

        .app {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--ui-scale));
            height: calc(100vh / var(--ui-scale));
            background: var(--surface);
            border: none;
            border-radius: 0;
            box-shadow: none;
            display: grid;
            grid-template-columns: 312px 1fr;
            overflow: hidden;
            transform: scale(var(--ui-scale));
            transform-origin: top left;
        }

        .sidebar {
            padding: 18px 18px 0;
            border-right: 1px solid var(--line);
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr) var(--composer-bar-height);
            gap: 14px;
            background: var(--sidebar-bg);
            min-height: 0;
        }

        .main {
            display: grid;
            min-width: 0;
            min-height: 0;
            height: 100%;
            background: var(--chat-bg);
        }

        .header {
            padding: 20px 24px 14px;
            border-bottom: 1px solid var(--line);
            background: #fff;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.3px;
            line-height: 1.2;
            color: #1e3a8a;
            position: relative;
            padding-bottom: 8px;
        }

        .brand-title::after {
            content: "";
            display: block;
            width: 34px;
            height: 2px;
            margin-top: 8px;
            border-radius: 999px;
            background: #2563eb;
        }

        .chat-title {
            display: inline-block;
            max-width: 100%;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1px;
            color: #1e293b;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .new-btn {
            border: 1px solid #2563eb;
            border-radius: var(--radius-md);
            padding: 11px 13px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            box-shadow: none;
            transition: background 120ms ease;
        }

        .new-btn:hover {
            background: var(--accent-hover);
        }

        .new-conv-btn {
            width: 100%;
            border-color: #c9d8ef;
            background: #fff;
            color: #1f56d8;
            padding: 12px 14px;
            display: inline-flex;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 8px;
            text-align: center;
            box-shadow: none;
            transition: background 120ms ease;
        }

        .new-conv-btn:hover {
            background: #eef4ff;
            border-color: #bfcfe8;
        }

        .new-conv-btn:active {
            background: #e3edff;
            border-color: #b4c6e3;
        }

        .new-conv-icon {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            background: #e8f0ff;
            display: inline-grid;
            place-items: center;
            font-size: 14px;
            line-height: 1;
            font-weight: 800;
        }

        .new-conv-label {
            letter-spacing: 0.2px;
        }

        .conv-list {
            overflow: auto;
            display: grid;
            gap: 10px;
            align-content: start;
            min-height: 0;
            padding-right: 4px;
        }

        .sidebar-footer {
            min-height: var(--composer-bar-height);
            height: var(--composer-bar-height);
            border-top: 1px solid var(--line);
            border-left: none;
            border-right: none;
            border-bottom: none;
            border-radius: 0;
            background: transparent;
            padding: 8px 10px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: baseline;
            gap: 3px;
            box-shadow: none;
        }

        .user-profile {
            min-width: 0;
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 7px;
            align-items: baseline;
            align-self: center;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #e4edff;
            border: 1px solid #c5d8ff;
            color: #1b4dd0;
            font-size: 13px;
            font-weight: 800;
            display: grid;
            place-items: center;
            letter-spacing: 0.5px;
            box-shadow: none;
            align-self: center;
        }

        .user-name {
            font-size: 14px;
            font-weight: 700;
            color: #1e3a8a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            align-self: center;
        }

        .settings-btn {
            border: 1px solid #c9daf8;
            border-radius: var(--radius-sm);
            background: #eef4ff;
            color: #1f4fbf;
            font-weight: 700;
            font-size: 13px;
            line-height: 1;
            padding: 8px 9px;
            display: inline-grid;
            grid-auto-flow: column;
            gap: 4px;
            align-items: baseline;
            cursor: pointer;
            align-self: center;
            transition: background 120ms ease, border-color 120ms ease;
        }

        .settings-btn-icon {
            font-size: 13px;
            line-height: 1;
        }

        .settings-btn-label {
            letter-spacing: 0.2px;
        }

        .settings-btn:hover {
            background: #e2edff;
            border-color: #b9cbf0;
        }

        .conv-item {
            border: 1px solid transparent;
            border-bottom-color: var(--line);
            background: transparent;
            border-radius: 0;
            padding: 11px 10px 11px 12px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            color: #1e293b;
            box-shadow: none;
            position: relative;
            transition: border-color 120ms ease, background 120ms ease;
        }

        .conv-item:hover {
            border-color: var(--line-strong);
            background: #eef3fb;
        }

        .conv-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 2px;
            border-radius: 999px;
            background: transparent;
        }

        .conv-item.active {
            border-bottom-color: var(--accent);
            background: var(--accent-soft);
            color: #0f3ca8;
            box-shadow: none;
        }

        .conv-item.active::before {
            background: var(--accent);
        }

        .meta input {
            border: 1px solid var(--line);
            background: #ffffff;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 14px;
            color: var(--text);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .meta input:focus {
            outline: none;
            border-color: #95b5ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .messages {
            overflow: auto;
            padding: 20px;
            display: grid;
            gap: 10px;
            align-content: start;
            min-height: 0;
        }

        .msg {
            max-width: min(78%, 760px);
            margin-inline: 0;
            border-radius: var(--radius-lg);
            padding: 11px 14px;
            font-family: "PingFang SC", "Hiragino Sans GB", "Source Han Sans SC", "Microsoft YaHei UI", sans-serif;
            line-height: 1.5;
            animation: rise 200ms ease-out;
            white-space: pre-wrap;
            box-shadow: none;
        }

        .msg.md {
            white-space: normal;
        }

        .msg.md p {
            margin: 0.2rem 0 0.5rem;
        }

        .msg.md p:last-child {
            margin-bottom: 0;
        }

        .msg.md pre {
            overflow-x: auto;
            padding: 8px;
            border-radius: 8px;
            background: #f4f7ff;
            border: 1px solid var(--line);
            margin: 0.4rem 0;
        }

        .msg.md code {
            font-family: Consolas, "Courier New", monospace;
            background: #f4f7ff;
            border-radius: 4px;
            padding: 1px 4px;
        }

        .msg.md pre code {
            background: transparent;
            padding: 0;
        }

        .msg.md ul,
        .msg.md ol {
            margin: 0.2rem 0 0.5rem 1.2rem;
            padding: 0;
        }

        .msg.md blockquote {
            margin: 0.4rem 0;
            padding-left: 0.75rem;
            border-left: 3px solid var(--line);
            color: #4b5563;
        }

        .u {
            justify-self: end;
            background: #3b82f6;
            color: #fff;
            border: 1px solid #3b82f6;
            border-bottom-right-radius: 8px;
        }

        .a {
            justify-self: start;
            background: #fff;
            border: 1px solid var(--line);
            color: var(--text);
            border-bottom-left-radius: 8px;
        }

        .assistant-block {
            justify-self: start;
            max-width: min(78%, 760px);
            margin-inline: 0;
            display: grid;
            gap: 6px;
        }

        .assistant-block .msg {
            margin-inline: 0;
            max-width: 100%;
        }

        .tool-trace {
            border: 1px solid #dbe3ef;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-size: 13px;
            color: #334155;
        }

        .tool-trace summary {
            cursor: pointer;
            font-weight: 700;
            color: #1e40af;
            user-select: none;
        }

        .tool-trace pre {
            margin: 6px 0 0;
            padding: 8px;
            border-radius: 8px;
            background: #f1f5f9;
            border: 1px solid #dbe3ef;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.45;
        }

        .composer {
            margin: 0;
            border-top: 1px solid var(--line);
            border-left: none;
            border-right: none;
            border-bottom: none;
            border-radius: 0;
            background: #fff;
            box-shadow: none;
            padding: 10px 14px 10px 12px;
            min-height: var(--composer-bar-height);
            height: var(--composer-bar-height);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: stretch;
        }

        .composer input {
            border: none;
            border-radius: var(--radius-md);
            height: 44px;
            padding: 0 14px;
            font-size: 14px;
            background: var(--surface-soft);
            color: var(--text);
        }

        .composer input:focus {
            outline: none;
            box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.22);
        }

        .composer button {
            border: none;
            border-radius: var(--radius-md);
            padding: 0 20px;
            height: 44px;
            background: #3b82f6;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            box-shadow: none;
            transition: background 120ms ease;
        }

        .composer button:hover {
            background: #2563eb;
        }

        .chat-view {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 0;
            height: 100%;
        }

        .settings-view {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.32);
            backdrop-filter: blur(1px);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .settings-dialog {
            width: min(860px, calc(100vw - 40px));
            height: min(600px, calc(100vh - 40px));
            background: #fff;
            border: 1px solid #dce4f0;
            border-radius: 16px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.15);
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
        }

        .settings-dialog-header {
            padding: 14px 18px;
            border-bottom: 1px solid #e3eaf4;
            background: #fff;
            display: grid;
            gap: 2px;
        }

        .settings-title {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.1px;
        }

        .settings-dialog-body {
            min-height: 0;
            display: grid;
            grid-template-columns: 176px 1fr;
        }

        .settings-nav {
            border-right: 1px solid #e8edf5;
            padding: 12px 10px;
            display: grid;
            gap: 6px;
            align-content: start;
            background: #fbfdff;
        }

        .settings-nav-btn {
            border: 1px solid transparent;
            border-radius: 9px;
            background: transparent;
            color: #334155;
            text-align: left;
            padding: 9px 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
        }

        .settings-nav-btn:hover {
            border-color: #dbe4f2;
            background: #f8fbff;
            color: #0f172a;
        }

        .settings-nav-btn.active {
            border-color: #d6e1f3;
            background: #f2f7ff;
            color: #1d4ed8;
        }

        .settings-panel-wrap {
            min-height: 0;
            overflow: auto;
            padding: 18px;
            display: grid;
            grid-template-rows: minmax(0, 1fr);
            align-content: stretch;
            background: #fff;
        }

        .settings-panel {
            display: grid;
            gap: 12px;
            min-height: 0;
        }

        .settings-panel.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .settings-group {
            display: grid;
            gap: 7px;
        }

        .skill-upload-card {
            padding: 12px;
            border: 1px solid #d7e1ee;
            border-radius: 12px;
            background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .skill-upload-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .skill-upload-hint {
            color: #64748b;
            font-size: 12px;
        }

        .skill-upload-actions {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: start;
        }

        .skill-upload-picker-wrap {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 10px;
            align-items: start;
            min-width: 0;
        }

        .skill-upload-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skill-upload-picker {
            display: inline-block;
            height: 38px;
            line-height: 38px;
            padding: 0 14px;
            border: 1px solid #c7d4e4;
            border-radius: 9px;
            background: linear-gradient(180deg, #ffffff 0%, #f6f9fc 100%);
            color: #334155;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        }

        .skill-upload-picker:hover {
            background: #f8fafc;
            border-color: #9fb5d0;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }

        .skill-upload-file-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #64748b;
            font-size: 12px;
            height: 38px;
            line-height: 38px;
        }

        #settingsPanelMemory {
            display: grid;
            grid-template-rows: 1fr;
            min-height: 0;
            height: 100%;
            min-height: 100%;
            align-content: stretch;
        }

        #settingsPanelSkills {
            align-content: start;
        }

        #settingsPanelPolicy {
            align-content: start;
        }

        #settingsPanelMemory .settings-group {
            min-height: 0;
            height: 100%;
            grid-template-rows: auto 1fr;
        }

        .settings-group label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .settings-group textarea {
            width: 100%;
            min-height: 0;
            border: 1px solid #d8e2f0;
            border-radius: 10px;
            background: #fff;
            padding: 12px;
            font-size: 14px;
            resize: none;
            font-family: "Manrope", "Noto Sans SC", "Source Han Sans SC", sans-serif;
            line-height: 1.55;
            color: #0f172a;
        }

        #longTermMemory {
            height: 100%;
        }

        .settings-group textarea:focus {
            outline: none;
            border-color: #c6d6ee;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .skills-list {
            border: 1px solid #d8e2f0;
            border-radius: 10px;
            background: #fff;
            padding: 4px 10px;
            display: grid;
            gap: 0;
        }

        .skill-item {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            gap: 9px;
            font-size: 14px;
            color: #334155;
            padding: 10px 2px;
            border-bottom: 1px solid #edf2f8;
        }

        .skill-item:last-child {
            border-bottom: none;
        }

        .skill-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            margin: 0;
            accent-color: #3b82f6;
        }

        .settings-footer {
            border-top: 1px solid #e3eaf4;
            padding: 12px 14px;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: stretch;
            background: #fff;
        }

        .secondary-btn {
            border: 1px solid #d4ddea;
            border-radius: 9px;
            background: #fff;
            color: #334155;
            font-weight: 600;
            padding: 0 14px;
            height: 38px;
            cursor: pointer;
        }

        .secondary-btn:hover {
            background: #f8fafc;
        }

        .skill-upload-actions .secondary-btn {
            min-width: 88px;
        }

        .primary-btn {
            border: 1px solid #2f6de6;
            border-radius: 9px;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            padding: 0 14px;
            height: 38px;
            cursor: pointer;
            transition: background 120ms ease;
        }

        .primary-btn:hover {
            background: #2f6de6;
        }

        .status-text {
            justify-self: start;
            align-self: center;
            font-size: 12px;
            color: #64748b;
            min-height: 20px;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            body {
                padding: 0;
            }

            .app {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                grid-template-columns: 1fr;
                grid-template-rows: 240px 1fr;
            }

            .sidebar {
                border-right: 0;
                border-bottom: 1px solid var(--line);
                padding: 14px 14px 0;
            }

            .messages {
                padding: 16px;
            }

            .msg,
            .assistant-block {
                max-width: 92%;
            }

            .composer {
                margin: 0;
            }

            .settings-view {
                padding: 12px;
            }

            .settings-dialog {
                width: calc(100vw - 24px);
                height: calc(100vh - 24px);
            }

            .settings-dialog-body {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .settings-nav {
                border-right: none;
                border-bottom: 1px solid var(--line);
                grid-template-columns: 1fr 1fr;
                padding: 8px;
            }

            .settings-footer {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .status-text {
                order: 3;
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased">
    <div class="app">
        <aside class="sidebar">
            <div class="brand-title tracking-tight">WozClaw</div>
            <div class="meta">
                <input id="userId" value="demo-user" placeholder="user_id"
                    class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2.5 text-sm text-slate-900 outline-none focus:ring-2 focus:ring-brand-100" />
                <button id="newConversationBtn" class="new-btn new-conv-btn" type="button">
                    <span class="new-conv-icon" aria-hidden="true">+</span>
                    <span class="new-conv-label">新建对话</span>
                </button>
            </div>
            <div id="conversationList" class="conv-list"></div>
            <div class="sidebar-footer">
                <div id="userProfile" class="user-profile">
                    <div id="userAvatar" class="avatar">D</div>
                    <div id="userNameLabel" class="user-name">demo-user</div>
                </div>
                <button id="openSettingsBtn" class="settings-btn inline-flex items-center" type="button">
                    <span class="settings-btn-icon" aria-hidden="true">⚙</span>
                    <span class="settings-btn-label">设置</span>
                </button>
            </div>
        </aside>

        <section class="main">
            <div id="chatView" class="chat-view">
                <div class="header">
                    <div id="currentTitle" class="chat-title">新对话</div>
                </div>

                <div id="messages" class="messages"></div>

                <form id="chatForm" class="composer">
                    <input id="text" autocomplete="off" placeholder="输入消息，例如：记住我喜欢中文回答"
                        class="w-full rounded-xl border-0 bg-slate-50 text-slate-900" />
                    <button type="submit" class="inline-flex items-center justify-center">发送</button>
                </form>
            </div>

            <div id="settingsView" class="settings-view hidden">
                <div class="settings-dialog" role="dialog" aria-modal="true" aria-label="配置中心">
                    <div class="settings-dialog-header">
                        <div class="settings-title">配置中心</div>
                    </div>

                    <div class="settings-dialog-body">
                        <div class="settings-nav">
                            <button id="settingsTabMemory" class="settings-nav-btn active" type="button"
                                data-panel="memory">长期记忆</button>
                            <button id="settingsTabPolicy" class="settings-nav-btn" type="button"
                                data-panel="policy">命令审批</button>
                            <button id="settingsTabSkills" class="settings-nav-btn" type="button"
                                data-panel="skills">Skills</button>
                        </div>

                        <div class="settings-panel-wrap">
                            <div id="settingsPanelMemory" class="settings-panel">
                                <div class="settings-group">
                                    <label for="longTermMemory">长期记忆</label>
                                    <textarea id="longTermMemory" placeholder="在这里编辑用户长期记忆..."></textarea>
                                </div>
                            </div>

                            <div id="settingsPanelSkills" class="settings-panel hidden">
                                <div class="settings-group skill-upload-card">
                                    <div class="skill-upload-head">
                                        <label for="skillUploadFile">上传 Skill ZIP</label>
                                        <span class="skill-upload-hint">自动解压并启用</span>
                                    </div>
                                    <div class="skill-upload-actions">
                                        <div class="skill-upload-picker-wrap">
                                            <input id="skillUploadFile" class="skill-upload-input" type="file"
                                                accept=".zip,application/zip" />
                                            <label for="skillUploadFile" class="skill-upload-picker">选择 ZIP 文件</label>
                                            <span id="skillUploadFileName" class="skill-upload-file-name">未选择文件</span>
                                        </div>
                                        <button id="skillUploadBtn" class="secondary-btn" type="button">上传</button>
                                    </div>
                                </div>

                                <div class="settings-group">
                                    <label for="skillsList">Skills 开关</label>
                                    <div id="skillsList" class="skills-list"></div>
                                </div>
                            </div>

                            <div id="settingsPanelPolicy" class="settings-panel hidden">
                                <div class="settings-group">
                                    <label for="commandAllowlist">命令审批策略</label>
                                    <div class="grid gap-2">
                                        <div class="grid grid-cols-2 gap-2">
                                            <label>读操作
                                                <select id="policyReadAction"
                                                    class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm">
                                                    <option value="allow">allow</option>
                                                    <option value="ask_human">ask_human</option>
                                                    <option value="deny">deny</option>
                                                </select>
                                            </label>
                                            <label>写操作
                                                <select id="policyWriteAction"
                                                    class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm">
                                                    <option value="allow">allow</option>
                                                    <option value="ask_human" selected>ask_human</option>
                                                    <option value="deny">deny</option>
                                                </select>
                                            </label>
                                            <label>删操作
                                                <select id="policyDeleteAction"
                                                    class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm">
                                                    <option value="allow">allow</option>
                                                    <option value="ask_human" selected>ask_human</option>
                                                    <option value="deny">deny</option>
                                                </select>
                                            </label>
                                            <label>执行操作
                                                <select id="policyExecAction"
                                                    class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm">
                                                    <option value="allow">allow</option>
                                                    <option value="ask_human" selected>ask_human</option>
                                                    <option value="deny">deny</option>
                                                </select>
                                            </label>
                                        </div>
                                        <label for="commandAllowlist">命令白名单（逗号分隔）
                                            <input id="commandAllowlist"
                                                class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm"
                                                placeholder="例如: ls,cat,rg,grep,find" />
                                        </label>
                                        <label for="commandBlocklist">命令黑名单（逗号分隔）
                                            <input id="commandBlocklist"
                                                class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm"
                                                placeholder="例如: curl,wget,ssh" />
                                        </label>
                                        <label for="allowedPaths">允许路径列表（逗号分隔）
                                            <input id="allowedPaths"
                                                class="w-full border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm"
                                                placeholder="例如: root/workdir,.sandbox/skills/demo-user" />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="settings-footer">
                        <div id="settingsStatus" class="status-text"></div>
                        <button id="backToChatBtn" class="secondary-btn" type="button">关闭</button>
                        <button id="saveSettingsBtn" class="primary-btn" type="button">保存配置</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        const messagesEl = document.getElementById('messages');
        const chatForm = document.getElementById('chatForm');
        const textEl = document.getElementById('text');
        const userIdEl = document.getElementById('userId');
        const newConversationBtn = document.getElementById('newConversationBtn');
        const conversationListEl = document.getElementById('conversationList');
        const currentTitleEl = document.getElementById('currentTitle');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const userProfileEl = document.getElementById('userProfile');
        const userAvatarEl = document.getElementById('userAvatar');
        const userNameLabelEl = document.getElementById('userNameLabel');
        const chatViewEl = document.getElementById('chatView');
        const settingsViewEl = document.getElementById('settingsView');
        const longTermMemoryEl = document.getElementById('longTermMemory');
        const skillUploadFileEl = document.getElementById('skillUploadFile');
        const skillUploadFileNameEl = document.getElementById('skillUploadFileName');
        const skillUploadBtnEl = document.getElementById('skillUploadBtn');
        const skillsListEl = document.getElementById('skillsList');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const backToChatBtn = document.getElementById('backToChatBtn');
        const settingsStatusEl = document.getElementById('settingsStatus');
        const settingsTabMemoryEl = document.getElementById('settingsTabMemory');
        const settingsTabPolicyEl = document.getElementById('settingsTabPolicy');
        const settingsTabSkillsEl = document.getElementById('settingsTabSkills');
        const settingsPanelMemoryEl = document.getElementById('settingsPanelMemory');
        const settingsPanelPolicyEl = document.getElementById('settingsPanelPolicy');
        const settingsPanelSkillsEl = document.getElementById('settingsPanelSkills');
        const policyReadActionEl = document.getElementById('policyReadAction');
        const policyWriteActionEl = document.getElementById('policyWriteAction');
        const policyDeleteActionEl = document.getElementById('policyDeleteAction');
        const policyExecActionEl = document.getElementById('policyExecAction');
        const commandAllowlistEl = document.getElementById('commandAllowlist');
        const commandBlocklistEl = document.getElementById('commandBlocklist');
        const allowedPathsEl = document.getElementById('allowedPaths');

        let currentSessionId = null;
        let conversations = [];
        let completedRequestIds = new Set();

        function completedRequestStorageKey() {
            const userId = userIdEl.value.trim() || 'demo-user';
            const sessionId = currentSessionId || 'no-session';
            return `wozclaw.completedRequests.${userId}.${sessionId}`;
        }

        function loadCompletedRequestIds() {
            completedRequestIds = new Set();
            try {
                const raw = sessionStorage.getItem(completedRequestStorageKey()) || '[]';
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) {
                    completedRequestIds = new Set(parsed.map((id) => String(id || '').trim()).filter(Boolean));
                }
            } catch (err) {
                console.warn('Failed to load completed request ids:', err);
            }
        }

        function markRequestCompleted(requestId) {
            const id = String(requestId || '').trim();
            if (!id) return;
            completedRequestIds.add(id);
            try {
                sessionStorage.setItem(completedRequestStorageKey(), JSON.stringify(Array.from(completedRequestIds)));
            } catch (err) {
                console.warn('Failed to persist completed request ids:', err);
            }
        }

        function unmarkRequestCompleted(requestId) {
            const id = String(requestId || '').trim();
            if (!id) return;
            completedRequestIds.delete(id);
            try {
                sessionStorage.setItem(completedRequestStorageKey(), JSON.stringify(Array.from(completedRequestIds)));
            } catch (err) {
                console.warn('Failed to rollback completed request ids:', err);
            }
        }

        function removeRequestCardsById(type, requestId) {
            const id = String(requestId || '').trim();
            if (!id) return;
            const selector = `[data-request-card="${type}:${id}"]`;
            messagesEl.querySelectorAll(selector).forEach((node) => node.remove());
        }

        function clearTransientStatusMessages() {
            messagesEl.querySelectorAll('[data-transient-status="1"]').forEach((node) => node.remove());
        }

        function addTransientStatusMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg a rounded-chat';
            div.dataset.transientStatus = '1';
            div.textContent = String(text || '').trim();
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function getUserInitials(userName) {
            const text = String(userName || '').trim();
            if (!text) return 'U';

            const normalized = text.replace(/([a-z])([A-Z])/g, '$1 $2');
            const words = normalized.split(/[^a-zA-Z0-9]+/).filter(Boolean);
            if (words.length > 0) {
                return words.map((word) => word.charAt(0).toUpperCase()).join('').slice(0, 2);
            }

            return text.replace(/\s+/g, '').slice(0, 2).toUpperCase();
        }

        function syncUserProfile() {
            const userName = userIdEl.value.trim() || 'user';
            userNameLabelEl.textContent = userName;
            userAvatarEl.textContent = getUserInitials(userName);
            userProfileEl.title = userName;
        }

        function renderSkillsList(skills = []) {
            skillsListEl.innerHTML = '';
            if (!Array.isArray(skills) || skills.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'skill-item';
                empty.textContent = '当前用户没有可配置的 skills';
                skillsListEl.appendChild(empty);
                return;
            }

            skills.forEach((item) => {
                const row = document.createElement('label');
                row.className = 'skill-item';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = Boolean(item.enabled);
                checkbox.dataset.skillName = String(item.name || '');

                const name = document.createElement('span');
                name.textContent = String(item.name || '');

                row.appendChild(checkbox);
                row.appendChild(name);
                skillsListEl.appendChild(row);
            });
        }

        function collectSkillsFromUI() {
            const checkboxes = skillsListEl.querySelectorAll('input[type="checkbox"]');
            return Array.from(checkboxes)
                .map((item) => ({
                    name: String(item.dataset.skillName || ''),
                    enabled: Boolean(item.checked),
                }))
                .filter((item) => item.name);
        }

        function parseCommaList(text) {
            return String(text || '')
                .split(',')
                .map((item) => item.trim())
                .filter(Boolean);
        }

        function fillCommandPolicy(policy = {}) {
            const operations = policy.operations || {};
            policyReadActionEl.value = String(operations.read || 'allow');
            policyWriteActionEl.value = String(operations.write || 'ask_human');
            policyDeleteActionEl.value = String(operations.delete || 'ask_human');
            policyExecActionEl.value = String(operations.exec || 'ask_human');
            commandAllowlistEl.value = Array.isArray(policy.command_allowlist) ? policy.command_allowlist.join(',') : '';
            commandBlocklistEl.value = Array.isArray(policy.command_blocklist) ? policy.command_blocklist.join(',') : '';
            allowedPathsEl.value = Array.isArray(policy.allowed_paths) ? policy.allowed_paths.join(',') : '';
        }

        function collectCommandPolicyFromUI() {
            return {
                enabled: true,
                default_action: 'ask_human',
                operations: {
                    read: String(policyReadActionEl.value || 'allow'),
                    write: String(policyWriteActionEl.value || 'ask_human'),
                    delete: String(policyDeleteActionEl.value || 'ask_human'),
                    exec: String(policyExecActionEl.value || 'ask_human'),
                },
                command_allowlist: parseCommaList(commandAllowlistEl.value),
                command_blocklist: parseCommaList(commandBlocklistEl.value),
                allowed_paths: parseCommaList(allowedPathsEl.value),
            };
        }

        async function loadSettings() {
            const user_id = userIdEl.value.trim();
            const res = await fetch(`/api/settings?user_id=${encodeURIComponent(user_id)}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '加载配置失败');

            longTermMemoryEl.value = String(data.long_term_memory || '');
            renderSkillsList(data.skills || []);
            fillCommandPolicy(data.command_policy || {});
        }

        async function uploadSkillZip() {
            const file = skillUploadFileEl.files && skillUploadFileEl.files[0];
            if (!file) {
                throw new Error('请选择 zip 文件');
            }

            const user_id = userIdEl.value.trim();
            const formData = new FormData();
            formData.append('user_id', user_id);
            formData.append('file', file);

            const res = await fetch('/api/skills/upload', {
                method: 'POST',
                body: formData,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '上传失败');

            skillUploadFileEl.value = '';
            skillUploadFileNameEl.textContent = '未选择文件';
            await loadSettings();
            settingsStatusEl.textContent = `上传成功: ${data.name || 'skill'}`;
        }

        async function saveSettings() {
            const user_id = userIdEl.value.trim();
            const payload = {
                user_id,
                long_term_memory: String(longTermMemoryEl.value || ''),
                skills: collectSkillsFromUI(),
                command_policy: collectCommandPolicyFromUI(),
            };

            const res = await fetch('/api/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '保存配置失败');
        }

        async function openSettingsView() {
            settingsStatusEl.textContent = '';
            await loadSettings();
            switchSettingsPanel('memory');
            settingsViewEl.classList.remove('hidden');
        }

        function openChatView() {
            settingsViewEl.classList.add('hidden');
        }

        function resetPageScroll() {
            if ('scrollRestoration' in history) {
                history.scrollRestoration = 'manual';
            }
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;
        }

        function scheduleScrollReset() {
            resetPageScroll();
            requestAnimationFrame(() => {
                resetPageScroll();
                requestAnimationFrame(resetPageScroll);
            });
        }

        function switchSettingsPanel(panelName) {
            const active = String(panelName || 'memory');
            const showMemory = active === 'memory';
            const showPolicy = active === 'policy';
            const showSkills = active === 'skills';

            settingsPanelMemoryEl.classList.toggle('hidden', !showMemory);
            settingsPanelPolicyEl.classList.toggle('hidden', !showPolicy);
            settingsPanelSkillsEl.classList.toggle('hidden', !showSkills);
            settingsTabMemoryEl.classList.toggle('active', showMemory);
            settingsTabPolicyEl.classList.toggle('active', showPolicy);
            settingsTabSkillsEl.classList.toggle('active', showSkills);
        }

        function buildLegacyActivityTraces(toolCalls = [], loadedSkills = []) {
            const traces = [];

            if (Array.isArray(toolCalls)) {
                toolCalls.forEach((call) => {
                    traces.push({
                        type: 'tool',
                        name: String(call?.name || 'tool'),
                        source: '',
                        dir: '',
                        input: String(call?.input || ''),
                        output: String(call?.output || ''),
                    });
                });
            }

            return traces;
        }

        function visibleActivityTraces(activityTraces = [], toolCalls = [], loadedSkills = []) {
            const traces = Array.isArray(activityTraces) && activityTraces.length > 0
                ? activityTraces
                : buildLegacyActivityTraces(toolCalls, loadedSkills);
            return traces.filter((item) => String(item?.type || 'tool') !== 'skill');
        }

        function formatActivityTraces(activityTraces = [], toolCalls = [], loadedSkills = []) {
            const traces = visibleActivityTraces(activityTraces, toolCalls, loadedSkills);

            if (traces.length === 0) {
                return '';
            }

            const lines = ['### 调用轨迹（按时间顺序）'];
            traces.forEach((item, idx) => {
                const type = String(item?.type || 'tool');
                const name = String(item?.name || (type === 'skill' ? 'skill' : 'tool'));
                const source = String(item?.source || '');
                const dir = String(item?.dir || '');
                const input = String(item?.input || '');
                const output = String(item?.output || '');

                if (idx > 0) {
                    lines.push('--------------------');
                }

                const typeLabel = type === 'skill' ? '技能' : '工具';
                lines.push(`${idx + 1}. [${typeLabel}] ${name}`);
                if (type === 'skill') {
                    if (source) {
                        lines.push(`- 来源: ${source}`);
                    }
                    if (dir) {
                        lines.push(`- 目录: ${dir}`);
                    }
                }
                if (input) {
                    lines.push(`- 输入: ${input}`);
                }
                if (output) {
                    lines.push(`- 输出: ${output}`);
                }
            });

            return lines.join('\n');
        }

        function getLatestAssistantBlock() {
            const last = messagesEl.lastElementChild;
            if (!last) {
                return null;
            }
            return last.classList.contains('assistant-block') ? last : null;
        }

        function appendActivityTracesToBlock(block, activityTraces = [], toolCalls = [], loadedSkills = []) {
            const incoming = visibleActivityTraces(activityTraces, toolCalls, loadedSkills);
            if (incoming.length === 0) {
                return;
            }

            let details = block.querySelector('details.tool-trace');
            let summary = null;
            let pre = null;

            if (!details) {
                details = document.createElement('details');
                details.className = 'tool-trace rounded-xl border border-slate-200 bg-slate-50/80';
                details.open = false;

                summary = document.createElement('summary');
                pre = document.createElement('pre');

                details.appendChild(summary);
                details.appendChild(pre);
                block.appendChild(details);
            } else {
                summary = details.querySelector('summary');
                pre = details.querySelector('pre');
            }

            if (!summary || !pre) {
                return;
            }

            let existing = [];
            const raw = String(details.dataset.traces || '').trim();
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) {
                        existing = parsed;
                    }
                } catch (err) {
                    console.warn('Failed to parse existing trace cache:', err);
                }
            }

            const merged = [...existing, ...incoming];
            details.dataset.traces = JSON.stringify(merged);
            summary.textContent = `调用轨迹 (${merged.length})`;
            pre.textContent = formatActivityTraces(merged, [], []);
        }

        function addAssistantMsg(text, toolCalls = [], loadedSkills = [], activityTraces = []) {
            clearTransientStatusMessages();
            const normalizedText = String(text || '').trim();
            const hiddenAssistantMessagePrefixes = [
                '检测到需要人工审批，已暂停执行并等待审批结果',
                '检测到需要做出选择，已暂停执行并等待用户选择',
            ];
            const shouldHideText = hiddenAssistantMessagePrefixes.some((prefix) => normalizedText.startsWith(prefix));

            let block = getLatestAssistantBlock();
            if (!block) {
                block = document.createElement('div');
                block.className = 'assistant-block space-y-2';
                messagesEl.appendChild(block);
            }

            appendActivityTracesToBlock(block, activityTraces, toolCalls, loadedSkills);

            if (!shouldHideText && normalizedText) {
                const msg = document.createElement('div');
                msg.className = 'msg a md rounded-chat';
                const markdownHtml = marked.parse(normalizedText, {
                    breaks: true,
                    gfm: true,
                });
                msg.innerHTML = DOMPurify.sanitize(markdownHtml);
                block.appendChild(msg);
            }

            if (block.children.length === 0) {
                block.remove();
                return;
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addApprovalRequestCard(request) {
            const item = request || {};
            const requestId = String(item.request_id || '');
            const command = String(item.command || '');
            const operation = String(item.operation || 'unknown');
            const reason = String(item.reason || 'requires human approval');
            if (!requestId || !command) return;
            if (completedRequestIds.has(requestId)) return;
            if (messagesEl.querySelector(`[data-request-card="approval:${requestId}"]`)) return;

            const wrap = document.createElement('div');
            wrap.className = 'msg a rounded-chat';
            wrap.dataset.requestCard = `approval:${requestId}`;

            const title = document.createElement('div');
            title.className = 'font-semibold';
            title.textContent = '需要人工审批';

            const desc = document.createElement('pre');
            desc.className = 'mt-2 whitespace-pre-wrap text-sm';
            desc.textContent = `操作类型: ${operation}\n原因: ${reason}\n命令: ${command}`;

            const actions = document.createElement('div');
            actions.className = 'mt-2 flex gap-2';

            const approveBtn = document.createElement('button');
            approveBtn.type = 'button';
            approveBtn.className = 'primary-btn';
            approveBtn.textContent = '批准执行';

            const rejectBtn = document.createElement('button');
            rejectBtn.type = 'button';
            rejectBtn.className = 'secondary-btn';
            rejectBtn.textContent = '拒绝执行';

            const setBusy = (busy) => {
                approveBtn.disabled = busy;
                rejectBtn.disabled = busy;
            };

            async function submitApproval(approved) {
                setBusy(true);
                const approvedLabel = approved ? '已批准' : '已拒绝';
                markRequestCompleted(requestId);
                wrap.remove();
                removeRequestCardsById('approval', requestId);
                addTransientStatusMsg(approvedLabel);
                try {
                    const user_id = userIdEl.value.trim();
                    const session_id = currentSessionId;
                    const res = await fetch('/api/approvals/decide', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id, session_id, request_id: requestId, approved }),
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        unmarkRequestCompleted(requestId);
                        addApprovalRequestCard(item);
                        addMsg('a', `审批处理失败: ${data.detail || 'unknown error'}`);
                        setBusy(false);
                        return;
                    }

                    addAssistantMsg(data.reply || '', data.tool_calls || [], [], []);

                    // Show next approval if present
                    if (data.approval_request) {
                        addApprovalRequestCard(data.approval_request);
                    }

                    // Show next choice if present
                    if (data.choice_request) {
                        addChoiceRequestCard(data.choice_request);
                    }

                    await loadConversations();
                    renderConversationList();
                } catch (err) {
                    unmarkRequestCompleted(requestId);
                    addApprovalRequestCard(item);
                    addMsg('a', `审批请求失败: ${err}`);
                    setBusy(false);
                }
            }

            approveBtn.addEventListener('click', async () => {
                await submitApproval(true);
            });
            rejectBtn.addEventListener('click', async () => {
                await submitApproval(false);
            });

            actions.appendChild(approveBtn);
            actions.appendChild(rejectBtn);
            wrap.appendChild(title);
            wrap.appendChild(desc);
            wrap.appendChild(actions);

            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addChoiceRequestCard(request) {
            const item = request || {};
            const requestId = String(item.request_id || '');
            const question = String(item.question || '请在以下选项中选择');
            const options = Array.isArray(item.options) ? item.options.map((v) => String(v || '').trim()).filter(Boolean) : [];
            const allowCustom = item.allow_custom !== false;
            if (!requestId) return;
            if (completedRequestIds.has(requestId)) return;
            if (messagesEl.querySelector(`[data-request-card="choice:${requestId}"]`)) return;

            const wrap = document.createElement('div');
            wrap.className = 'msg a rounded-chat';
            wrap.dataset.requestCard = `choice:${requestId}`;

            const title = document.createElement('div');
            title.className = 'font-semibold';
            title.textContent = '需要你做个选择';

            const desc = document.createElement('div');
            desc.className = 'mt-2 text-sm';
            desc.textContent = question;

            const optionsWrap = document.createElement('div');
            optionsWrap.className = 'mt-2 flex flex-wrap gap-2';

            const customWrap = document.createElement('div');
            customWrap.className = 'mt-2 flex gap-2';
            const customInput = document.createElement('input');
            customInput.type = 'text';
            customInput.placeholder = '或输入你的自定义选项';
            customInput.className = 'flex-1 min-w-0 border border-slate-200 rounded-xl bg-white px-3 py-2 text-sm';
            const customSubmit = document.createElement('button');
            customSubmit.type = 'button';
            customSubmit.className = 'secondary-btn shrink-0 whitespace-nowrap min-w-24';
            customSubmit.textContent = '提交自定义';

            let activeButtons = [];
            const setBusy = (busy) => {
                activeButtons.forEach((btn) => {
                    btn.disabled = busy;
                });
                customInput.disabled = busy;
                customSubmit.disabled = busy;
            };

            async function submitChoice(selectedOption = '', customInputText = '') {
                setBusy(true);
                const finalChoice = customInputText || selectedOption;
                const choiceMessage = question
                    ? `针对问题【${question}】我的选择是：${finalChoice}`
                    : `我的选择是：${finalChoice}`;
                markRequestCompleted(requestId);
                wrap.remove();
                removeRequestCardsById('choice', requestId);
                const pendingChoiceMsgEl = addMsg('u', choiceMessage, false);
                pendingChoiceMsgEl.dataset.pendingChoice = '1';
                try {
                    const user_id = userIdEl.value.trim();
                    const session_id = currentSessionId;
                    const res = await fetch('/api/choices/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id,
                            session_id,
                            request_id: requestId,
                            selected_option: selectedOption,
                            custom_input: customInputText,
                        }),
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        unmarkRequestCompleted(requestId);
                        pendingChoiceMsgEl.remove();
                        addChoiceRequestCard(item);
                        addMsg('a', `提交选择失败: ${data.detail || 'unknown error'}`);
                        setBusy(false);
                        return;
                    }

                    addAssistantMsg(
                        `${data.reply}`,
                        data.tool_calls || [],
                        data.loaded_skills || [],
                        data.activity_traces || [],
                    );
                    if (data.approval_request) {
                        addApprovalRequestCard(data.approval_request);
                    }
                    if (data.choice_request) {
                        addChoiceRequestCard(data.choice_request);
                    }
                    if (data.title) {
                        currentTitleEl.textContent = data.title;
                    }
                    await loadConversations();
                    renderConversationList();
                } catch (err) {
                    unmarkRequestCompleted(requestId);
                    pendingChoiceMsgEl.remove();
                    addChoiceRequestCard(item);
                    addMsg('a', `提交选择失败: ${err}`);
                    setBusy(false);
                }
            }

            options.forEach((optionText) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'secondary-btn';
                btn.textContent = optionText;
                btn.addEventListener('click', async () => {
                    await submitChoice(optionText, '');
                });
                activeButtons.push(btn);
                optionsWrap.appendChild(btn);
            });

            customSubmit.addEventListener('click', async () => {
                const customText = String(customInput.value || '').trim();
                if (!customText) {
                    addMsg('a', '请输入自定义选项内容');
                    return;
                }
                await submitChoice('', customText);
            });

            wrap.appendChild(title);
            wrap.appendChild(desc);
            if (options.length > 0) {
                wrap.appendChild(optionsWrap);
            }
            if (allowCustom) {
                customWrap.appendChild(customInput);
                customWrap.appendChild(customSubmit);
                wrap.appendChild(customWrap);
            }

            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addMsg(cls, text, renderMarkdown = false) {
            if (cls === 'u') {
                clearTransientStatusMessages();
            }
            const div = document.createElement('div');
            div.className = `msg ${cls} rounded-chat`;
            if (renderMarkdown) {
                div.classList.add('md');
                const markdownHtml = marked.parse(text, {
                    breaks: true,
                    gfm: true,
                });
                div.innerHTML = DOMPurify.sanitize(markdownHtml);
            } else {
                div.textContent = text;
            }
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function clearMessages() {
            messagesEl.innerHTML = '';
        }

        async function createConversation() {
            const user_id = userIdEl.value.trim();
            const res = await fetch('/api/conversations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '创建会话失败');
            return data.session_id;
        }

        function renderConversationList() {
            conversationListEl.innerHTML = '';
            conversations.forEach((item) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'conv-item w-full transition duration-150 ease-out' + (item.session_id === currentSessionId ? ' active' : '');
                btn.textContent = item.title || '新对话';
                btn.addEventListener('click', () => switchConversation(item.session_id, item.title));
                conversationListEl.appendChild(btn);
            });
        }

        async function loadConversations() {
            const user_id = userIdEl.value.trim();
            const res = await fetch(`/api/conversations?user_id=${encodeURIComponent(user_id)}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '加载会话失败');
            conversations = data.items || [];
            renderConversationList();
        }

        async function loadMessages(sessionId) {
            const user_id = userIdEl.value.trim();
            const res = await fetch(`/api/conversations/${encodeURIComponent(sessionId)}/messages?user_id=${encodeURIComponent(user_id)}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '加载历史失败');
            clearMessages();
            (data.items || []).forEach((item) => {
                if (item.role === 'assistant') {
                    addAssistantMsg(
                        item.content,
                        item.tool_calls || [],
                        item.loaded_skills || [],
                        item.activity_traces || [],
                    );
                } else {
                    addMsg('u', item.content, false);
                }
            });
        }

        async function switchConversation(sessionId, title = '新对话') {
            currentSessionId = sessionId;
            loadCompletedRequestIds();
            currentTitleEl.textContent = title || '新对话';
            renderConversationList();
            await loadMessages(sessionId);
            await loadPendingState(sessionId);
        }

        async function loadPendingState(sessionId) {
            try {
                const user_id = userIdEl.value.trim();
                const res = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}/pending-state?user_id=${encodeURIComponent(user_id)}`);
                const data = await res.json();
                if (!res.ok) return;

                // Restore pending approvals
                const pending_approvals = Array.isArray(data.pending_approvals) ? data.pending_approvals : [];
                pending_approvals.forEach(approval => {
                    addApprovalRequestCard(approval);
                });

                // Restore pending choices
                const pending_choices = Array.isArray(data.pending_choices) ? data.pending_choices : [];
                pending_choices.forEach(choice => {
                    addChoiceRequestCard(choice);
                });
            } catch (err) {
                console.error('Failed to load pending state:', err);
            }
        }

        async function bootstrap() {
            await loadConversations();
            if (conversations.length === 0) {
                currentSessionId = await createConversation();
                conversations = [{ session_id: currentSessionId, title: '新对话' }];
                renderConversationList();
                clearMessages();
                currentTitleEl.textContent = '新对话';
                return;
            }
            await switchConversation(conversations[0].session_id, conversations[0].title);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = textEl.value.trim();
            if (!message) return;

            const user_id = userIdEl.value.trim();
            if (!currentSessionId) {
                currentSessionId = await createConversation();
            }
            const session_id = currentSessionId;

            addMsg('u', message);
            textEl.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id, session_id, message }),
                });

                const data = await res.json();
                if (!res.ok) {
                    addMsg('a', `错误: ${data.detail || '请求失败'}`);
                    return;
                }

                addAssistantMsg(
                    `${data.reply}`,
                    data.tool_calls || [],
                    data.loaded_skills || [],
                    data.activity_traces || [],
                );
                if (data.approval_request) {
                    addApprovalRequestCard(data.approval_request);
                }
                if (data.choice_request) {
                    addChoiceRequestCard(data.choice_request);
                }
                if (data.title) {
                    currentTitleEl.textContent = data.title;
                }
                await loadConversations();
                renderConversationList();
            } catch (err) {
                addMsg('a', `网络错误: ${err}`);
            }
        });

        newConversationBtn.addEventListener('click', async () => {
            try {
                const sessionId = await createConversation();
                currentSessionId = sessionId;
                currentTitleEl.textContent = '新对话';
                clearMessages();
                await loadConversations();
                conversations.unshift({ session_id: sessionId, title: '新对话' });
                renderConversationList();
            } catch (err) {
                addMsg('a', `创建会话失败: ${err}`);
            }
        });

        userIdEl.addEventListener('change', async () => {
            currentSessionId = null;
            syncUserProfile();
            await bootstrap();
        });

        openSettingsBtn.addEventListener('click', async () => {
            try {
                await openSettingsView();
            } catch (err) {
                addMsg('a', `加载配置失败: ${err}`);
            }
        });

        backToChatBtn.addEventListener('click', () => {
            openChatView();
        });

        settingsTabMemoryEl.addEventListener('click', () => {
            switchSettingsPanel('memory');
        });

        settingsTabPolicyEl.addEventListener('click', () => {
            switchSettingsPanel('policy');
        });

        settingsTabSkillsEl.addEventListener('click', () => {
            switchSettingsPanel('skills');
        });

        skillUploadFileEl.addEventListener('change', () => {
            const file = skillUploadFileEl.files && skillUploadFileEl.files[0];
            skillUploadFileNameEl.textContent = file ? file.name : '未选择文件';
        });

        skillUploadBtnEl.addEventListener('click', async () => {
            try {
                settingsStatusEl.textContent = '';
                await uploadSkillZip();
            } catch (err) {
                settingsStatusEl.textContent = `上传失败: ${err}`;
            }
        });

        saveSettingsBtn.addEventListener('click', async () => {
            try {
                await saveSettings();
                settingsStatusEl.textContent = '保存成功';
            } catch (err) {
                settingsStatusEl.textContent = `保存失败: ${err}`;
            }
        });

        window.addEventListener('pageshow', scheduleScrollReset);
        window.addEventListener('load', scheduleScrollReset);
        window.addEventListener('beforeunload', resetPageScroll);
        scheduleScrollReset();
        syncUserProfile();

        bootstrap().catch((err) => {
            addMsg('a', `初始化失败: ${err}`);
        });
    </script>
</body>

</html>
