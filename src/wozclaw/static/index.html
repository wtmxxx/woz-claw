<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://www.wotemo.com/img/WotemoRoundCorner.png" />
    <title>WozClaw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef4ff',
                            100: '#dbe8ff',
                            500: '#2563eb',
                            600: '#1d4ed8',
                            700: '#1e40af',
                        },
                    },
                    boxShadow: {
                        card: '0 8px 24px rgba(37, 99, 235, 0.08)',
                        pop: '0 14px 36px rgba(15, 23, 42, 0.12)',
                    },
                    borderRadius: {
                        'chat': '18px',
                    },
                },
            },
        };
    </script>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-soft: #f5f7fb;
            --sidebar-bg: #f3f6fb;
            --chat-bg: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff4ff;
            --line: #dbe3ef;
            --line-strong: #c8d5e8;
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 22px;
            --shadow-card: none;
            --shadow-pop: none;
            --ui-scale: 1.15;
            --composer-bar-height: 64px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            font-family: "Manrope", "Noto Sans SC", "Source Han Sans SC", sans-serif;
            color: var(--text);
            background: var(--bg);
            display: block;
            padding: 0;
            overflow: hidden;
        }

        .app {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--ui-scale));
            height: calc(100vh / var(--ui-scale));
            background: var(--surface);
            border: none;
            border-radius: 0;
            box-shadow: none;
            display: grid;
            grid-template-columns: 312px 1fr;
            overflow: hidden;
            transform: scale(var(--ui-scale));
            transform-origin: top left;
        }

        .sidebar {
            padding: 18px 18px 0;
            border-right: 1px solid var(--line);
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr) var(--composer-bar-height);
            gap: 14px;
            background: var(--sidebar-bg);
            min-height: 0;
        }

        .main {
            display: grid;
            min-width: 0;
            min-height: 0;
            height: 100%;
            background: var(--chat-bg);
        }

        .header {
            padding: 20px 24px 14px;
            border-bottom: 1px solid var(--line);
            background: #fff;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.3px;
            line-height: 1.2;
            color: #1e3a8a;
            position: relative;
            padding-bottom: 8px;
        }

        .brand-title::after {
            content: "";
            display: block;
            width: 34px;
            height: 2px;
            margin-top: 8px;
            border-radius: 999px;
            background: #2563eb;
        }

        .chat-title {
            display: inline-block;
            max-width: 100%;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1px;
            color: #1e293b;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .new-btn {
            border: 1px solid #2563eb;
            border-radius: var(--radius-md);
            padding: 11px 13px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            box-shadow: none;
            transition: background 120ms ease;
        }

        .new-btn:hover {
            background: var(--accent-hover);
        }

        .new-conv-btn {
            width: 100%;
            border-color: #c9d8ef;
            background: #fff;
            color: #1f56d8;
            padding: 12px 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            box-shadow: none;
            transition: background 120ms ease;
        }

        .new-conv-btn:hover {
            background: #eef4ff;
            border-color: #bfcfe8;
        }

        .new-conv-btn:active {
            background: #e3edff;
            border-color: #b4c6e3;
        }

        .new-conv-icon {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            background: #e8f0ff;
            display: inline-grid;
            place-items: center;
            font-size: 14px;
            line-height: 1;
            font-weight: 800;
        }

        .new-conv-label {
            letter-spacing: 0.2px;
        }

        .conv-list {
            overflow: auto;
            display: grid;
            gap: 10px;
            align-content: start;
            min-height: 0;
            padding-right: 4px;
        }

        .sidebar-footer {
            min-height: var(--composer-bar-height);
            height: var(--composer-bar-height);
            border-top: 1px solid var(--line);
            border-left: none;
            border-right: none;
            border-bottom: none;
            border-radius: 0;
            background: transparent;
            padding: 8px 10px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: baseline;
            gap: 3px;
            box-shadow: none;
        }

        .user-profile {
            min-width: 0;
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 7px;
            align-items: baseline;
            align-self: center;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #e4edff;
            border: 1px solid #c5d8ff;
            color: #1b4dd0;
            font-size: 13px;
            font-weight: 800;
            display: grid;
            place-items: center;
            letter-spacing: 0.5px;
            box-shadow: none;
            align-self: center;
        }

        .user-name {
            font-size: 14px;
            font-weight: 700;
            color: #1e3a8a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            align-self: center;
        }

        .settings-btn {
            border: 1px solid #c9daf8;
            border-radius: var(--radius-sm);
            background: #eef4ff;
            color: #1f4fbf;
            font-weight: 700;
            font-size: 13px;
            line-height: 1;
            padding: 8px 9px;
            display: inline-grid;
            grid-auto-flow: column;
            gap: 4px;
            align-items: baseline;
            cursor: pointer;
            align-self: center;
            transition: background 120ms ease, border-color 120ms ease;
        }

        .settings-btn-icon {
            font-size: 13px;
            line-height: 1;
        }

        .settings-btn-label {
            letter-spacing: 0.2px;
        }

        .settings-btn:hover {
            background: #e2edff;
            border-color: #b9cbf0;
        }

        .conv-item {
            border: none;
            background: transparent;
            border-radius: 8px;
            padding: 10px 10px 10px 12px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            color: #1e293b;
            box-shadow: none;
            position: relative;
            width: 100%;
            transition: background 120ms ease;
        }

        .conv-item:hover {
            background: transparent;
        }

        .conv-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 2px;
            border-radius: 999px;
            background: transparent;
        }

        .conv-item.active {
            background: transparent;
            color: #0f3ca8;
            box-shadow: none;
        }

        .conv-item.active::before {
            background: var(--accent);
        }

        .conv-row {
            display: block;
        }

        .conv-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #ffffff;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 4px;
            align-items: center;
            transition: border-color 120ms ease, background 120ms ease;
        }

        .conv-card:hover {
            border-color: var(--line-strong);
            background: #f8fbff;
        }

        .conv-card.active {
            border-color: #bfd3ff;
            background: #f4f8ff;
        }

        .conv-main {
            min-width: 0;
        }

        .conv-menu-wrap {
            position: relative;
            padding-right: 6px;
        }

        .conv-menu-trigger {
            border: none;
            background: transparent;
            color: #475569;
            border-radius: 8px;
            width: 30px;
            height: 30px;
            line-height: 1;
            font-size: 16px;
            padding: 0;
            cursor: pointer;
            transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
        }

        .conv-menu-trigger:hover {
            background: transparent;
            color: #1e293b;
        }

        .conv-menu-list {
            position: absolute;
            right: 0;
            top: calc(100% + 4px);
            min-width: 120px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            padding: 6px;
            z-index: 20;
            display: grid;
            gap: 4px;
        }

        .conv-menu-item {
            border: 1px solid transparent;
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            text-align: left;
            padding: 8px 10px;
            font-size: 13px;
            cursor: pointer;
        }

        .conv-menu-item:hover {
            background: #fff1f2;
            color: #be123c;
            border-color: #fecdd3;
        }

        .conv-menu-item.rename:hover {
            background: #eef4ff;
            color: #1d4ed8;
            border-color: #cfe0ff;
        }

        .meta input {
            border: 1px solid var(--line);
            background: #ffffff;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 14px;
            color: var(--text);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .meta input:focus {
            outline: none;
            border-color: #95b5ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .messages {
            overflow: auto;
            padding: 20px;
            display: grid;
            gap: 10px;
            align-content: start;
            min-height: 0;
            overflow-y: auto;
        }

        .msg {
            max-width: min(78%, 760px);
            margin-inline: 0;
            border-radius: var(--radius-lg);
            padding: 11px 14px;
            font-family: "PingFang SC", "Hiragino Sans GB", "Source Han Sans SC", "Microsoft YaHei UI", sans-serif;
            line-height: 1.5;
            animation: rise 200ms ease-out;
            white-space: pre-wrap;
            box-shadow: none;
        }

        .msg.md {
            white-space: normal;
        }

        .msg.md p {
            margin: 0.2rem 0 0.5rem;
        }

        .msg.md p:last-child {
            margin-bottom: 0;
        }

        .msg.md pre {
            overflow-x: auto;
            padding: 8px;
            border-radius: 8px;
            background: #f4f7ff;
            border: 1px solid var(--line);
            margin: 0.4rem 0;
        }

        .msg.md code {
            font-family: Consolas, "Courier New", monospace;
            background: #f4f7ff;
            border-radius: 4px;
            padding: 1px 4px;
        }

        .msg.md pre code {
            background: transparent;
            padding: 0;
        }

        .msg.md ul,
        .msg.md ol {
            margin: 0.2rem 0 0.5rem 1.2rem;
            padding: 0;
        }

        .msg.md blockquote {
            margin: 0.4rem 0;
            padding-left: 0.75rem;
            border-left: 3px solid var(--line);
            color: #4b5563;
        }

        .u {
            justify-self: end;
            background: #3b82f6;
            color: #fff;
            border: 1px solid #3b82f6;
            border-bottom-right-radius: 8px;
        }

        .a {
            justify-self: start;
            background: #fff;
            border: 1px solid var(--line);
            color: var(--text);
            border-bottom-left-radius: 8px;
        }

        .assistant-block {
            justify-self: start;
            max-width: min(78%, 760px);
            margin-inline: 0;
            margin-left: 40px;
            display: grid;
            gap: 6px;
        }

        .assistant-block .msg {
            margin-inline: 0;
            max-width: 100%;
        }

        .tool-trace {
            border: 1px solid #dbe3ef;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-size: 13px;
            color: #334155;
        }

        .tool-trace summary {
            cursor: pointer;
            font-weight: 700;
            color: #1e40af;
            user-select: none;
        }

        .tool-trace pre {
            margin: 6px 0 0;
            padding: 8px;
            border-radius: 8px;
            background: #f1f5f9;
            border: 1px solid #dbe3ef;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.45;
        }

        .thinking-trace {
            border: 1px solid #dbe3ef;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 13px;
            color: #334155;
            margin: 8px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .thinking-trace summary {
            cursor: pointer;
            user-select: none;
            list-style: none;
            display: flex;
            gap: 8px;
            color: #1e40af;
        }

        .thinking-trace summary::-webkit-details-marker {
            display: none;
        }

        .thinking-trace .thinking-toggle {
            width: 14px;
            font-size: 10px;
            color: #3b82f6;
            transition: transform 200ms ease;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .thinking-trace[open] .thinking-toggle {
            transform: rotate(90deg);
        }

        .thinking-trace .thinking-label {
            font-weight: 700;
            color: #1e40af;
            margin-right: 4px;
        }

        .thinking-trace .thinking-preview {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #334155;
        }

        .thinking-trace[open] .thinking-preview {
            display: none;
        }

        .thinking-trace pre {
            margin: 8px 0 0;
            padding: 8px;
            border-radius: 8px;
            background: #f1f5f9;
            border: 1px solid #dbe3ef;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.45;
            color: #334155;
            max-height: 200px;
            overflow-y: auto;
        }

        .realtime-trace {
            border: 1px solid #dbe3ef;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 13px;
            color: #334155;
            margin: 8px 0;
        }

        .realtime-trace .trace-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
        }

        .realtime-trace .trace-header:hover {
            opacity: 0.8;
        }

        .realtime-trace .trace-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            font-size: 10px;
            color: #64748b;
            transition: transform 200ms ease;
        }

        .realtime-trace .trace-toggle.expanded {
            transform: rotate(90deg);
        }

        .realtime-trace .trace-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .realtime-trace .trace-icon.running {
            background: #fef3c7;
            color: #d97706;
            animation: pulse 1.5s infinite;
        }

        .realtime-trace .trace-icon.completed {
            background: #d1fae5;
            color: #059669;
        }

        .realtime-trace .trace-icon.pending {
            background: #fce7f3;
            color: #d946ef;
            animation: pulse 1.5s infinite;
        }

        .realtime-trace .trace-name {
            font-weight: 700;
            color: #1e40af;
        }

        .realtime-trace .trace-status {
            font-size: 11px;
            color: #64748b;
            margin-left: auto;
        }

        .realtime-trace .trace-content {
            margin-left: 26px;
        }

        .realtime-trace .trace-input {
            margin-top: 4px;
        }

        .realtime-trace .trace-content.collapsed .trace-input {
            display: none;
        }

        .realtime-trace .trace-output {
            margin-top: 4px;
            display: none;
        }

        .realtime-trace .trace-content.expanded .trace-output {
            display: block;
        }

        .realtime-trace .trace-input pre,
        .realtime-trace .trace-output pre {
            margin: 4px 0 0;
            padding: 6px 8px;
            border-radius: 6px;
            background: #f1f5f9;
            border: 1px solid #dbe3ef;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.4;
            max-height: 200px;
            overflow-y: auto;
        }

        .realtime-trace .trace-output pre {
            background: #ecfdf5;
            border-color: #a7f3d0;
        }

        .realtime-trace .trace-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .realtime-trace .collapsible {
            cursor: pointer;
        }

        .realtime-trace .collapsible::before {
            content: '▶ ';
            font-size: 10px;
        }

        .realtime-trace .collapsible.expanded::before {
            content: '▼ ';
        }

        .realtime-trace .collapsible-content {
            display: none;
        }

        .realtime-trace .collapsible-content.expanded {
            display: block;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .composer {
            margin: 0;
            border-top: 1px solid var(--line);
            border-left: none;
            border-right: none;
            border-bottom: none;
            border-radius: 0;
            background: #fff;
            box-shadow: none;
            padding: 10px 14px 10px 12px;
            min-height: var(--composer-bar-height);
            height: var(--composer-bar-height);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: stretch;
        }

        .composer-input-wrap {
            min-width: 0;
            display: flex;
            align-items: stretch;
            overflow: hidden;
        }

        .composer input {
            border: none;
            border-radius: var(--radius-md);
            height: 44px;
            padding: 0 14px;
            font-size: 14px;
            background: var(--surface-soft);
            color: var(--text);
            width: 100%;
            min-width: 0;
            resize: none;
        }

        .composer input:focus {
            outline: none;
            box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.22);
        }

        .composer button {
            border: none;
            border-radius: var(--radius-md);
            padding: 0 20px;
            height: 44px;
            background: #3b82f6;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            box-shadow: none;
            transition: background 120ms ease;
        }

        .composer button:hover {
            background: #2563eb;
        }

        .chat-view {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 0;
            height: 100%;
        }

        .settings-view {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.32);
            backdrop-filter: blur(1px);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .settings-dialog {
            width: min(860px, calc(100vw - 40px));
            height: min(600px, calc(100vh - 40px));
            background: #fff;
            border: 1px solid #dce4f0;
            border-radius: 16px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.15);
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
        }

        .settings-dialog-header {
            padding: 14px 18px;
            border-bottom: 1px solid #e3eaf4;
            background: #fff;
            display: grid;
            gap: 2px;
        }

        .settings-title {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.1px;
        }

        .settings-dialog-body {
            min-height: 0;
            display: grid;
            grid-template-columns: 176px 1fr;
        }

        .settings-nav {
            border-right: 1px solid #e8edf5;
            padding: 12px 10px;
            display: grid;
            gap: 6px;
            align-content: start;
            background: #fbfdff;
        }

        .settings-nav-btn {
            border: 1px solid transparent;
            border-radius: 9px;
            background: transparent;
            color: #334155;
            text-align: left;
            padding: 9px 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
        }

        .settings-nav-btn:hover {
            border-color: #dbe4f2;
            background: #f8fbff;
            color: #0f172a;
        }

        .settings-nav-btn.active {
            border-color: #d6e1f3;
            background: #f2f7ff;
            color: #1d4ed8;
        }

        .settings-panel-wrap {
            min-height: 0;
            overflow: auto;
            padding: 18px;
            display: grid;
            grid-template-rows: minmax(0, 1fr);
            align-content: stretch;
            background: #fff;
        }

        .settings-panel {
            display: grid;
            gap: 12px;
            min-height: 0;
        }

        .settings-panel.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .settings-group {
            display: grid;
            gap: 7px;
        }

        .skill-upload-card {
            padding: 12px;
            border: 1px solid #d7e1ee;
            border-radius: 12px;
            background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .skill-upload-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .skill-upload-hint {
            color: #64748b;
            font-size: 12px;
        }

        .skill-upload-actions {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: start;
        }

        .skill-upload-picker-wrap {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 10px;
            align-items: start;
            min-width: 0;
        }

        .skill-upload-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skill-upload-picker {
            display: inline-block;
            height: 38px;
            line-height: 38px;
            padding: 0 14px;
            border: 1px solid #c7d4e4;
            border-radius: 9px;
            background: linear-gradient(180deg, #ffffff 0%, #f6f9fc 100%);
            color: #334155;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        }

        .skill-upload-picker:hover {
            background: #f8fafc;
            border-color: #9fb5d0;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }

        .skill-upload-file-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #64748b;
            font-size: 12px;
            height: 38px;
            line-height: 38px;
        }

        #settingsPanelMemory {
            display: grid;
            grid-template-rows: 1fr;
            min-height: 0;
            height: 100%;
            min-height: 100%;
            align-content: stretch;
        }

        #settingsPanelSkills {
            align-content: start;
        }

        #settingsPanelPolicy {
            align-content: start;
        }

        #settingsPanelMemory .settings-group {
            min-height: 0;
            height: 100%;
            grid-template-rows: auto 1fr;
        }

        .settings-group label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .settings-group textarea {
            width: 100%;
            min-height: 0;
            border: 1px solid #d8e2f0;
            border-radius: 10px;
            background: #fff;
            padding: 12px;
            font-size: 14px;
            resize: none;
            font-family: "Manrope", "Noto Sans SC", "Source Han Sans SC", sans-serif;
            line-height: 1.55;
            color: #0f172a;
        }

        #longTermMemory {
            height: 100%;
        }

        .settings-group textarea:focus {
            outline: none;
            border-color: #c6d6ee;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .skills-list {
            border: 1px solid #d8e2f0;
            border-radius: 10px;
            background: #fff;
            padding: 4px 10px;
            display: grid;
            gap: 0;
        }

        .skill-item {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            gap: 9px;
            font-size: 14px;
            color: #334155;
            padding: 10px 2px;
            border-bottom: 1px solid #edf2f8;
        }

        .skill-item:last-child {
            border-bottom: none;
        }

        .skill-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            margin: 0;
            accent-color: #3b82f6;
        }

        .settings-footer {
            border-top: 1px solid #e3eaf4;
            padding: 12px 14px;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: stretch;
            background: #fff;
        }

        .secondary-btn {
            border: 1px solid #d4ddea;
            border-radius: 9px;
            background: #fff;
            color: #334155;
            font-weight: 600;
            padding: 0 14px;
            height: 38px;
            cursor: pointer;
        }

        .secondary-btn:hover {
            background: #f8fafc;
        }

        .skill-upload-actions .secondary-btn {
            min-width: 88px;
        }

        .primary-btn {
            border: 1px solid #2f6de6;
            border-radius: 9px;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            padding: 0 14px;
            height: 38px;
            cursor: pointer;
            transition: background 120ms ease;
        }

        .primary-btn:hover {
            background: #2f6de6;
        }

        .status-text {
            justify-self: start;
            align-self: center;
            font-size: 12px;
            color: #64748b;
            min-height: 20px;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            body {
                padding: 0;
            }

            .app {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                grid-template-columns: 1fr;
                grid-template-rows: 240px 1fr;
            }

            .sidebar {
                border-right: 0;
                border-bottom: 1px solid var(--line);
                padding: 14px 14px 0;
            }

            .messages {
                padding: 16px;
            }

            .msg,
            .assistant-block {
                max-width: 92%;
            }

            .composer {
                margin: 0;
            }

            .settings-view {
                padding: 12px;
            }

            .settings-dialog {
                width: calc(100vw - 24px);
                height: calc(100vh - 24px);
            }

            .settings-dialog-body {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .settings-nav {
                border-right: none;
                border-bottom: 1px solid var(--line);
                grid-template-columns: 1fr 1fr;
                padding: 8px;
            }

            .settings-footer {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .status-text {
                order: 3;
            }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        const messagesEl = document.getElementById('messages');
        const chatForm = document.getElementById('chatForm');
        const textEl = document.getElementById('text');
        const userIdEl = document.getElementById('userId');
        const newConversationBtn = document.getElementById('newConversationBtn');
        const conversationListEl = document.getElementById('conversationList');
        const currentTitleEl = document.getElementById('currentTitle');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const userProfileEl = document.getElementById('userProfile');
        const userAvatarEl = document.getElementById('userAvatar');
        const userNameLabelEl = document.getElementById('userNameLabel');
        const chatViewEl = document.getElementById('chatView');
        const settingsViewEl = document.getElementById('settingsView');
        const longTermMemoryEl = document.getElementById('longTermMemory');
        const skillUploadFileEl = document.getElementById('skillUploadFile');
        const skillUploadFileNameEl = document.getElementById('skillUploadFileName');
        const skillUploadBtnEl = document.getElementById('skillUploadBtn');
        const skillsListEl = document.getElementById('skillsList');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const backToChatBtn = document.getElementById('backToChatBtn');
        const settingsStatusEl = document.getElementById('settingsStatus');
        const settingsTabMemoryEl = document.getElementById('settingsTabMemory');
        const settingsTabPolicyEl = document.getElementById('settingsTabPolicy');
        const settingsTabSkillsEl = document.getElementById('settingsTabSkills');
        const settingsPanelMemoryEl = document.getElementById('settingsPanelMemory');
        const settingsPanelPolicyEl = document.getElementById('settingsPanelPolicy');
        const settingsPanelSkillsEl = document.getElementById('settingsPanelSkills');
        const policyReadActionEl = document.getElementById('policyReadAction');
        const policyWriteActionEl = document.getElementById('policyWriteAction');
        const policyDeleteActionEl = document.getElementById('policyDeleteAction');
        const policyExecActionEl = document.getElementById('policyExecAction');
        const commandAllowlistEl = document.getElementById('commandAllowlist');
        const commandBlocklistEl = document.getElementById('commandBlocklist');
        const allowedPathsEl = document.getElementById('allowedPaths');

        let currentSessionId = null;
        let conversations = [];
        let completedRequestIds = new Set();
        let eventSource = null;
        let pendingTraces = {};
        let disconnectTimer = null;

        function completedRequestStorageKey() {
            const userId = userIdEl.value.trim() || 'demo-user';
            const sessionId = currentSessionId || 'no-session';
            return `wozclaw.completedRequests.${userId}.${sessionId}`;
        }

        function loadCompletedRequestIds() {
            completedRequestIds = new Set();
            try {
                const raw = sessionStorage.getItem(completedRequestStorageKey()) || '[]';
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) {
                    completedRequestIds = new Set(parsed.map((id) => String(id || '').trim()).filter(Boolean));
                }
            } catch (err) {
                console.warn('Failed to load completed request ids:', err);
            }
        }

        function markRequestCompleted(requestId) {
            const id = String(requestId || '').trim();
            if (!id) return;
            completedRequestIds.add(id);
            try {
                sessionStorage.setItem(completedRequestStorageKey(), JSON.stringify(Array.from(completedRequestIds)));
            } catch (err) {
                console.warn('Failed to persist completed request ids:', err);
            }
        }

        function unmarkRequestCompleted(requestId) {
            const id = String(requestId || '').trim();
            if (!id) return;
            completedRequestIds.delete(id);
            try {
                sessionStorage.setItem(completedRequestStorageKey(), JSON.stringify(Array.from(completedRequestIds)));
            } catch (err) {
                console.warn('Failed to rollback completed request ids:', err);
            }
        }

        function removeRequestCardsById(type, requestId) {
            const id = String(requestId || '').trim();
            if (!id) return;
            const selector = `[data-request-card="${type}:${id}"]`;
            messagesEl.querySelectorAll(selector).forEach((node) => node.remove());
        }

        function clearTransientStatusMessages() {
            messagesEl.querySelectorAll('[data-transient-status="1"]').forEach((node) => node.remove());
        }

        function addTransientStatusMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg a rounded-chat';
            div.dataset.transientStatus = '1';
            div.textContent = String(text || '').trim();
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function connectEventSource(sessionId) {
            if (eventSource) {
                eventSource.close();
            }
            if (disconnectTimer) {
                clearTimeout(disconnectTimer);
                disconnectTimer = null;
            }

            const user_id = userIdEl.value.trim();
            eventSource = new EventSource(`/api/chat/stream/${encodeURIComponent(sessionId)}?user_id=${encodeURIComponent(user_id)}`);

            eventSource.onmessage = function (event) {
                try {
                    const data = JSON.parse(event.data);
                    handleToolTraceEvent(data);
                } catch (err) {
                    console.warn('Failed to parse SSE event:', err);
                }
            };

            eventSource.onerror = function (err) {
                console.error('SSE error:', err);
            };
        }

        function disconnectEventSource() {
            if (disconnectTimer) {
                clearTimeout(disconnectTimer);
                disconnectTimer = null;
            }
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }

        function scheduleDisconnectEventSource(delayMs = 250) {
            if (disconnectTimer) {
                clearTimeout(disconnectTimer);
            }
            disconnectTimer = setTimeout(() => {
                disconnectTimer = null;
                disconnectEventSource();
            }, delayMs);
        }

        function handleToolTraceEvent(event) {
            const type = event.type;
            const sessionId = event.session_id;

            if (sessionId !== currentSessionId) {
                return;
            }

            if (type === 'heartbeat') {
                return;
            }

            if (type === 'status') {
                handleStatusEvent(event);
                return;
            }

            if (type === 'assistant_thinking') {
                handleAssistantThinkingEvent(event);
                return;
            }

            if (type === 'assistant_text') {
                handleAssistantTextEvent(event);
                return;
            }

            if (type === 'tool_calling') {
                handleToolCallingEvent(event);
                return;
            }

            if (type === 'tool_called') {
                handleToolCalledEvent(event);
                return;
            }
        }

        function handleStatusEvent(event) {
            const status = event.status;
            const message = event.message || '';

            if (status === 'started') {
                addTransientStatusMsg('正在处理请求...');
            } else if (status === 'agent_ready') {
                clearTransientStatusMessages();
                addTransientStatusMsg('Agent 准备就绪，开始执行...');
            } else if (status === 'generating_reply') {
                clearTransientStatusMessages();
                addTransientStatusMsg('正在生成回复...');
            } else if (status === 'completed') {
                clearTransientStatusMessages();
                scheduleDisconnectEventSource();
            }
        }

        function handleAssistantThinkingEvent(event) {
            const text = String(event.text || '').trim();
            if (!text) {
                return;
            }

            let block = getLatestAssistantBlock();
            if (!block) {
                block = document.createElement('div');
                block.className = 'assistant-block space-y-2';
                messagesEl.appendChild(block);
            }

            block.appendChild(createThinkingTraceDetails(text));
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function handleAssistantTextEvent(event) {
            const text = String(event.text || '').trim();
            if (!text) {
                return;
            }
            addAssistantMsg(text, [], [], []);
        }

        function handleToolCallingEvent(event) {
            const name = event.name || 'unknown';
            const input = event.input || '';
            const traceId = String(event.trace_id || event.traceId || '').trim() || `realtime-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;

            const existingTraceEl = document.querySelector(`[data-trace-id="${traceId}"]`);
            if (existingTraceEl) {
                const nameSpan = existingTraceEl.querySelector('.trace-name');
                const status = existingTraceEl.querySelector('.trace-status');
                const inputPre = existingTraceEl.querySelector('.trace-input pre');
                const icon = existingTraceEl.querySelector('.trace-icon');

                if (nameSpan) {
                    nameSpan.textContent = `正在调用: ${name}`;
                }
                if (status) {
                    status.textContent = '运行中...';
                }
                if (inputPre) {
                    inputPre.textContent = input || '(无输入)';
                }
                if (icon) {
                    icon.className = 'trace-icon running';
                    icon.textContent = '⏳';
                }

                existingTraceEl.dataset.traceName = name;
                existingTraceEl.dataset.traceStatus = 'running';
                existingTraceEl.classList.remove('completed', 'pending');

                pendingTraces[traceId] = {
                    name: name,
                    input: input,
                    output: pendingTraces[traceId]?.output || null,
                    completed: false,
                    expanded: Boolean(pendingTraces[traceId]?.expanded),
                    status: 'running'
                };

                messagesEl.scrollTop = messagesEl.scrollHeight;
                return;
            }

            pendingTraces[traceId] = {
                name: name,
                input: input,
                output: null,
                completed: false,
                expanded: false,
                status: 'running'
            };

            let block = getLatestAssistantBlock();
            if (!block) {
                block = document.createElement('div');
                block.className = 'assistant-block space-y-2';
                messagesEl.appendChild(block);
            }

            const traceEl = document.createElement('div');
            traceEl.className = 'realtime-trace rounded-xl border border-slate-200 bg-slate-50/80';
            traceEl.id = traceId;
            traceEl.dataset.traceId = traceId;
            traceEl.dataset.traceName = name;

            const header = document.createElement('div');
            header.className = 'trace-header';

            const toggle = document.createElement('span');
            toggle.className = 'trace-toggle';
            toggle.textContent = '▶';

            const icon = document.createElement('span');
            icon.className = 'trace-icon running';
            icon.textContent = '⏳';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'trace-name';
            nameSpan.textContent = `正在调用: ${name}`;

            const status = document.createElement('span');
            status.className = 'trace-status';
            status.textContent = '运行中...';

            header.appendChild(toggle);
            header.appendChild(icon);
            header.appendChild(nameSpan);
            header.appendChild(status);

            const content = document.createElement('div');
            content.className = 'trace-content';

            const inputDiv = document.createElement('div');
            inputDiv.className = 'trace-input';

            const inputLabel = document.createElement('div');
            inputLabel.className = 'trace-label';
            inputLabel.textContent = '📥 输入:';

            const inputContent = document.createElement('pre');
            inputContent.textContent = input || '(无输入)';

            inputDiv.appendChild(inputLabel);
            inputDiv.appendChild(inputContent);

            const outputDiv = document.createElement('div');
            outputDiv.className = 'trace-output';

            const outputLabel = document.createElement('div');

            outputDiv.appendChild(outputLabel);
            outputDiv.appendChild(outputContent);

            content.appendChild(inputDiv);

            // Toggle expand/collapse on header click
            header.addEventListener('click', function () {
                const expanded = content.classList.toggle('expanded');
                toggle.classList.toggle('expanded', expanded);
                if (pendingTraces[traceId]) {
                    pendingTraces[traceId].expanded = expanded;

        function handleToolCalledEvent(event) {
            const output = event.output || '';
            const traceId = String(event.trace_id || event.traceId || '').trim();

            const isApprovalPlaceholder = output.startsWith('__APPROVAL_REQUIRED__');
            const isChoicePlaceholder = output.startsWith('__CHOICE_REQUIRED__');
            const isRejectedByHuman = String(output || '').trim() === 'rejected by human';

            const applyTraceUpdate = (traceEl) => {
                if (!traceEl) {
                    return false;
                }

                const icon = traceEl.querySelector('.trace-icon');
                const status = traceEl.querySelector('.trace-status');
                const outputDiv = traceEl.querySelector('.trace-output');
                const outputContent = outputDiv ? outputDiv.querySelector('pre') : null;

                if (!icon || !status || !outputContent) {
                    return false;
                }

                if (isApprovalPlaceholder) {
                    icon.className = 'trace-icon pending';
                    icon.textContent = '⏸';
                    status.textContent = '待批准';
                    traceEl.dataset.traceStatus = 'approval-pending';
                    traceEl.classList.remove('completed');
                    traceEl.classList.add('pending');
                    const marker = '__APPROVAL_REQUIRED__';
                    const raw = String(output || '').slice(marker.length).trim();
                    try {
                        const parsed = JSON.parse(raw);
                        const requestId = String(parsed?.request_id || '').trim();
                        if (requestId) {
                            traceEl.dataset.approvalRequestId = requestId;
                        }
                    } catch (err) {
                        // Keep UI non-blocking even when placeholder payload is malformed.
                    }
                } else if (isChoicePlaceholder) {
                    icon.className = 'trace-icon pending';
                    icon.textContent = '❓';
                    status.textContent = '待选择';
                    traceEl.dataset.traceStatus = 'choice-pending';
                    traceEl.classList.remove('completed');
                    traceEl.classList.add('pending');
                    const marker = '__CHOICE_REQUIRED__';
                    const raw = String(output || '').slice(marker.length).trim();
                    try {
                        const parsed = JSON.parse(raw);
                        const requestId = String(parsed?.request_id || '').trim();
                        if (requestId) {
                            traceEl.dataset.choiceRequestId = requestId;
                        }
                    } catch (err) {
                        // Keep UI non-blocking even when placeholder payload is malformed.
                    }
                } else if (isRejectedByHuman) {
                    icon.className = 'trace-icon completed';
                    icon.textContent = '✕';
                    status.textContent = '已拒绝';
                    traceEl.dataset.traceStatus = 'rejected';
                    traceEl.classList.remove('pending');
                    traceEl.classList.add('completed');
                } else {
                    icon.className = 'trace-icon completed';
                    icon.textContent = '✓';
                    status.textContent = '已完成';
                    traceEl.dataset.traceStatus = 'completed';
                    traceEl.classList.remove('pending');
                    traceEl.classList.add('completed');
                }

                outputContent.textContent = output || '(无输出)';

                const matchedTraceId = traceEl.dataset.traceId || traceId;
                if (matchedTraceId && pendingTraces[matchedTraceId]) {
                    pendingTraces[matchedTraceId].output = output;
                    pendingTraces[matchedTraceId].completed = !isApprovalPlaceholder && !isChoicePlaceholder;
                    pendingTraces[matchedTraceId].status = traceEl.dataset.traceStatus;
                }

                messagesEl.scrollTop = messagesEl.scrollHeight;
                return true;
            };

            if (traceId) {
                const traceEl = document.querySelector(`[data-trace-id="${traceId}"]`);
                if (applyTraceUpdate(traceEl)) {
                    return;
                }
            }
        }

        function getUserInitials(userName) {
            const text = String(userName || '').trim();
            if (!text) return 'U';

            const normalized = text.replace(/([a-z])([A-Z])/g, '$1 $2');
            const words = normalized.split(/[^a-zA-Z0-9]+/).filter(Boolean);
            if (words.length > 0) {
                return words.map((word) => word.charAt(0).toUpperCase()).join('').slice(0, 2);
            }

            return text.replace(/\s+/g, '').slice(0, 2).toUpperCase();
        }

        function buildLegacyActivityTraces(toolCalls = [], loadedSkills = []) {
            const traces = [];

            if (Array.isArray(toolCalls)) {
                toolCalls.forEach((call) => {
                    traces.push({
                        type: 'tool',
                        name: String(call?.name || 'tool'),
                        source: '',
                        dir: '',
                        input: String(call?.input || ''),
                        output: String(call?.output || ''),
                    });
                });
            }

            return traces;
        }

        function visibleActivityTraces(activityTraces = [], toolCalls = [], loadedSkills = []) {
            const traces = Array.isArray(activityTraces) && activityTraces.length > 0
                ? activityTraces
                : buildLegacyActivityTraces(toolCalls, loadedSkills);
            return traces.filter((item) => String(item?.type || 'tool') !== 'skill');
        }

        function formatActivityTraces(activityTraces = [], toolCalls = [], loadedSkills = []) {
            const traces = visibleActivityTraces(activityTraces, toolCalls, loadedSkills);

            if (traces.length === 0) {
                return '';
            }

            const lines = ['### 调用轨迹（按时间顺序）'];
            traces.forEach((item, idx) => {
                const type = String(item?.type || 'tool');
                const name = String(item?.name || (type === 'skill' ? 'skill' : 'tool'));
                const source = String(item?.source || '');
                const dir = String(item?.dir || '');
                const input = String(item?.input || '');
                const output = String(item?.output || '');

                if (idx > 0) {
                    lines.push('--------------------');
                }

                const typeLabel = type === 'skill' ? '技能' : '工具';
                lines.push(`${idx + 1}. [${typeLabel}] ${name}`);
                if (type === 'skill') {
                    if (source) {
                        lines.push(`- 来源: ${source}`);
                    }
                    if (dir) {
                        lines.push(`- 目录: ${dir}`);
                    }
                }
                if (input) {
                    lines.push(`- 输入: ${input}`);
                }
                if (output) {
                    lines.push(`- 输出: ${output}`);
                }
            });

            return lines.join('\n');
        }

        function getLatestAssistantBlock() {
            const last = messagesEl.lastElementChild;
            if (!last) {
                return null;
            }
            return last.classList.contains('assistant-block') ? last : null;
        }

        function appendActivityTracesToBlock(block, activityTraces = [], toolCalls = [], loadedSkills = []) {
            const incoming = visibleActivityTraces(activityTraces, toolCalls, loadedSkills);
            if (incoming.length === 0) {
                return;
            }

            let details = block.querySelector('details.tool-trace');
            let summary = null;
            let pre = null;

            if (!details) {
                details = document.createElement('details');
                details.className = 'tool-trace rounded-xl border border-slate-200 bg-slate-50/80';
                details.open = false;

                summary = document.createElement('summary');
                pre = document.createElement('pre');

                details.appendChild(summary);
                details.appendChild(pre);
                block.appendChild(details);
            } else {
                summary = details.querySelector('summary');
                pre = details.querySelector('pre');
            }

            if (!summary || !pre) {
                return;
            }

            let existing = [];
            const raw = String(details.dataset.traces || '').trim();
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) {
                        existing = parsed;
                    }
                } catch (err) {
                    console.warn('Failed to parse existing trace cache:', err);
                }
            }

            const merged = [...existing, ...incoming];
            details.dataset.traces = JSON.stringify(merged);
            summary.textContent = `调用轨迹 (${merged.length})`;
            pre.textContent = formatActivityTraces(merged, [], []);
        }

        function normalizeTextList(value) {
            if (!Array.isArray(value)) {
                return [];
            }
            return value.map((item) => String(item || '').trim()).filter(Boolean);
        }

        function normalizeTimelineEvents(value) {
            if (!Array.isArray(value)) {
                return [];
            }
            return value
                .map((item) => (item && typeof item === 'object' ? item : null))
                .filter(Boolean)
                .map((item, idx) => ({
                    type: String(item.type || '').trim(),
                    text: String(item.text || ''),
                    name: String(item.name || ''),
                    input: String(item.input || ''),
                    output: String(item.output || ''),
                    trace_id: String(item.trace_id || item.traceId || ''),
                    order: Number(item.order || idx + 1),
                }))
                .filter((item) => item.type)
                .sort((a, b) => a.order - b.order);
        }

        function appendHistoryToolTraceCard(block, toolCall = {}) {
            const name = String(toolCall.name || 'unknown');
            const input = String(toolCall.input || '');
            const output = String(toolCall.output || '');
            const traceId = String(toolCall.trace_id || toolCall.traceId || `history-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`);
            const isApprovalPlaceholderHistory = output.startsWith('__APPROVAL_REQUIRED__');
            const isChoicePlaceholderHistory = output.startsWith('__CHOICE_REQUIRED__');
            const isRejectedByHumanHistory = output.trim() === 'rejected by human';

            let historyTraceStatus = 'completed';
            let historyIconClass = 'trace-icon completed';
            let historyIconText = '✓';
            let historyStatusText = '已完成';
            let historyCardStateClass = 'completed';

            if (isApprovalPlaceholderHistory) {
                historyTraceStatus = 'approval-pending';
                historyIconClass = 'trace-icon pending';
                historyIconText = '⏸';
                historyStatusText = '待批准';
                historyCardStateClass = 'pending';
            } else if (isChoicePlaceholderHistory) {
                historyTraceStatus = 'choice-pending';
                historyIconClass = 'trace-icon pending';
                historyIconText = '❓';
                historyStatusText = '待选择';
                historyCardStateClass = 'pending';
            } else if (isRejectedByHumanHistory) {
                historyTraceStatus = 'rejected';
                historyIconClass = 'trace-icon completed';
                historyIconText = '✕';
                historyStatusText = '已拒绝';
                historyCardStateClass = 'completed';
            }

            const traceEl = document.createElement('div');
            traceEl.className = 'realtime-trace rounded-xl border border-slate-200 bg-slate-50/80';
            traceEl.id = traceId;
            traceEl.dataset.traceId = traceId;
            traceEl.dataset.traceName = name;
            traceEl.dataset.traceStatus = historyTraceStatus;
            traceEl.classList.add(historyCardStateClass);

            const header = document.createElement('div');
            header.className = 'trace-header';

            const toggle = document.createElement('span');
            toggle.className = 'trace-toggle';
            toggle.textContent = '▶';

            const icon = document.createElement('span');
            icon.className = historyIconClass;
            icon.textContent = historyIconText;

            const nameSpan = document.createElement('span');
            nameSpan.className = 'trace-name';
            nameSpan.textContent = `${name}`;

            const status = document.createElement('span');
            status.className = 'trace-status';
            status.textContent = historyStatusText;

            header.appendChild(toggle);
            header.appendChild(icon);
            header.appendChild(nameSpan);
            header.appendChild(status);

            const content = document.createElement('div');
            content.className = 'trace-content';

            const inputDiv = document.createElement('div');
            inputDiv.className = 'trace-input';

            const inputLabel = document.createElement('div');
            inputLabel.className = 'trace-label';
            inputLabel.textContent = '📥 输入:';

            const inputContent = document.createElement('pre');

            inputDiv.appendChild(inputLabel);
            inputDiv.appendChild(inputContent);

            const outputDiv = document.createElement('div');
            outputDiv.className = 'trace-output';

            const outputLabel = document.createElement('div');
            outputLabel.className = 'trace-label';

                const expanded = content.classList.toggle('expanded');
                toggle.classList.toggle('expanded', expanded);
