<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Chunker Demo</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container">
        <header class="hero">
            <p class="eyebrow">RAG DEMO</p>
            <h1>语义分片可视化演示</h1>
            <p class="sub">上传文本文件，实时查看 Chunk 文本、结构路径和关键元数据。</p>
        </header>

        <section class="panel form-panel">
            <form id="uploadForm">
                <div class="upload-card">
                    <div class="section-kicker">主入口</div>
                    <div class="file-dropzone" id="fileDropzone">
                        <input id="fileInput" name="file" type="file" accept=".txt,.md" required />
                        <div class="dropzone-inner">
                            <div class="dropzone-icon">↑</div>
                            <div class="dropzone-copy">
                                <strong>拖拽文件到这里，或点击选择</strong>
                                <span>支持 `.txt` / `.md`，上传后直接查看分片与元数据</span>
                            </div>
                        </div>
                    </div>
                    <div id="fileSummary" class="file-summary">尚未选择文件</div>
                    <button id="submitBtn" class="primary-action" type="submit">上传并拆分</button>
                </div>

                <div class="sample-card">
                    <div class="section-kicker secondary">快速加载</div>
                    <div class="row">
                        <label for="sampleSelect">内置样例</label>
                        <div class="inline-actions">
                            <select id="sampleSelect">
                                <option value="">请选择一个样例</option>
                                <option value="/samples/campus_notice.md">campus_notice.md · 校园网升级通知</option>
                                <option value="/samples/course_outline.txt">course_outline.txt · 课程大纲</option>
                                <option value="/samples/dorm_rules.md">dorm_rules.md · 宿舍管理公约</option>
                                <option value="/samples/club_event.txt">club_event.txt · 社团活动通知</option>
                                <option value="/samples/library_policy.md">library_policy.md · 图书馆借阅规则</option>
                                <option value="/samples/internship_notice.md">internship_notice.md · 实习与就业说明</option>
                                <option value="/samples/exam_rules.txt">exam_rules.txt · 考试纪律说明</option>
                                <option value="/samples/canteen_feedback.md">canteen_feedback.md · 食堂意见反馈</option>
                                <option value="/samples/graduate_research_guidelines.md">graduate_research_guidelines.md
                                    · 研究生科研与论文管理</option>
                                <option value="/samples/long_table_split.md">long_table_split.md · 超长表格切分测试</option>
                                <option value="/samples/library_research_workflow.txt">library_research_workflow.txt ·
                                    图书馆科研资料利用细则</option>
                                <option value="/samples/campus_safety_case.txt">campus_safety_case.txt · 校园安全与突发事件应对
                                </option>
                                <option value="/samples/student_affairs_faq.md">student_affairs_faq.md · 学生事务常见问题汇总
                                </option>
                            </select>
                            <button id="loadSampleBtn" type="button" class="secondary-action">加载样例</button>
                        </div>
                        <p class="hint">这条路径适合快速演示，点击后会直接读取样例并走同一套分片流程。</p>
                    </div>
                </div>

                <div class="parameters-card">
                    <div class="section-kicker tertiary">参数调节</div>
                    <div class="grid">
                        <div class="row">
                            <label for="baseMax">普通章节 max_size</label>
                            <input id="baseMax" name="base_max_size" type="number" min="128" value="1024" />
                        </div>
                        <div class="row">
                            <label for="keyMax">重点内容 max_size</label>
                            <input id="keyMax" name="key_content_max_size" type="number" min="128" value="1536" />
                        </div>
                        <div class="row">
                            <label for="overlap">overlap</label>
                            <input id="overlap" name="overlap" type="number" min="0" value="100" />
                        </div>
                    </div>
                </div>
            </form>
            <p id="status" class="status"></p>
        </section>

        <section id="summarySection" class="panel hidden">
            <h2>分片摘要</h2>
            <div id="summaryGrid" class="summary-grid"></div>
        </section>

        <div id="resultsWrapper" class="results-wrapper hidden">
            <section id="originalSection" class="results-panel results-panel-left">
                <div class="result-head">
                    <h2>原文预览</h2>
                    <span id="originalMeta" class="result-meta"></span>
                </div>
                <pre id="originalText" class="original-text"></pre>
            </section>

            <section id="chunksSection" class="results-panel results-panel-right">
                <div class="result-head">
                    <h2>Chunk 列表</h2>
                    <span class="result-meta sync-placeholder">占位</span>
                </div>
                <div id="chunksContainer" class="chunks"></div>
            </section>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>

</html>
